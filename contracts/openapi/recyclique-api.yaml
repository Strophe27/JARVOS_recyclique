        - name: ligne_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Ligne supprimée
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReceptionDeleteLigneResponse"
        "401":
          description: Non authentifié
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecycliqueApiError"
        "403":
          description: Story 7.2 — refus périmètre / permission.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecycliqueApiError"
        "404":
          description: Ligne introuvable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecycliqueApiError"
        "409":
          description: Ticket fermé
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecycliqueApiError"
  /v1/reception/tickets/{ticket_id}/lignes/{ligne_id}/weight:
    patch:
      operationId: recyclique_reception_patchLigneWeight
      tags:
        - reception
      summary: Corriger le poids d'une ligne (ADMIN / SUPER_ADMIN)
      description: |
        **Story 7.3 / B52** — Correction de poids en kg même si le ticket est **fermé**. Rôle serveur
        **ADMIN** ou **SUPER_ADMIN** uniquement ; recalcul statistiques et audit côté serveur.
      security:
        - bearerOrCookie: []
      parameters:
        - name: ticket_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: ligne_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReceptionLigneWeightPatchRequest"
      responses:
        "200":
          description: Poids mis à jour
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReceptionLigneResponse"
        "400":
          description: Ligne n'appartient pas au ticket ou UUID invalide
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecycliqueApiError"
        "401":
          description: Non authentifié
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecycliqueApiError"
        "403":
          description: Rôle insuffisant (USER ne peut pas appeler cette route)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecycliqueApiError"
        "404":
          description: Ligne introuvable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecycliqueApiError"
        "422":
          description: Poids invalide (≤ 0)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecycliqueApiError"
  /v1/reception/categories:
    get:
      operationId: recyclique_reception_listCategories
      tags:
        - reception
      summary: Liste des catégories actives (réception)
      description: |
        Équivalent opérationnel à une liste pour saisie ticket ; le backend filtre `is_active`.
      security:
        - bearerOrCookie: []
      responses:
        "200":
          description: Liste `{ id, name }`
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ReceptionCategoryRow"
        "401":
          description: Non authentifié
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecycliqueApiError"
        "403":
          description: |
            Story 7.2 — refus liste catégories (permission `reception.access` ou site affecté pour les USER).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecycliqueApiError"
components:
  securitySchemes:
    bearerOrCookie:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        JWT d'accès. Alternative same-origin : cookie httpOnly `recyclique_access` (nom par défaut serveur), sans duplication de la logique d'autorisation côté client.
  schemas:
    RecycliqueApiError:
      type: object
      description: |
        Enveloppe d'erreur JSON stable (AR21). Propriétés en snake_case ; dates ailleurs en ISO 8601.
        Le champ `correlation_id` reprend la valeur de corrélation (alignée sur `X-Request-Id`, Story 2.5).
      required:
        - code
        - detail
        - retryable
        - correlation_id
      properties:
        code:
          type: string
          description: |
            Code machine stable : soit dérivé du statut HTTP (UNAUTHORIZED, NOT_FOUND, …),
            soit code métier explicite pour certaines 403/409/429 (ex. STEP_UP_PIN_REQUIRED,
            IDEMPOTENCY_KEY_CONFLICT, STEP_UP_LOCKED).
        detail:
          description: |
            Message texte (4xx/5xx hors validation) ou liste d'erreurs de validation (422 — équivalent
            ancien corps FastAPI `detail` tableau).
          oneOf:
            - type: string
            - type: array
              items:
                type: object
                additionalProperties: true
        retryable:
          type: boolean
          description: Vrai si un nouvel essai peut réussir (ex. 429, 503).
        state:
          type: string
          nullable: true
          description: État opérationnel optionnel côté domaine ; `null` si non applicable.
        correlation_id:
          type: string
          description: Identifiant pour corrélation support et logs (sans données sensibles).
      additionalProperties: false
    CashSessionCloseBody:
      type: object
      required:
        - actual_amount
      properties:
        actual_amount:
          type: number
          minimum: 0
        variance_comment:
          type: string
          nullable: true
      additionalProperties: false
    CashSessionTotalsV1:
      type: object
      required:
        - sales_completed
        - refunds
        - net
      description: Agrégats clôture / Story 6.4 — net = sales_completed + refunds (refunds ≤ 0 typiquement).
      properties:
        sales_completed:
          type: number
        refunds:
          type: number
        net:
          type: number
      additionalProperties: false
    CashSessionResponse:
      type: object
      description: |
        Session caisse enrichie (GET current, réponses liste). Champs optionnels selon persistance / enrichissement.
      required:
        - id
        - operator_id
        - site_id
        - initial_amount
        - current_amount
        - status
        - opened_at
      properties:
        id:
          type: string
          format: uuid
        operator_id:
          type: string
        site_id:
          type: string
        register_id:
          type: string
          nullable: true
        initial_amount:
          type: number
        current_amount:
          type: number
        status:
          type: string
          enum:
            - open
            - closed
        opened_at:
          type: string
          format: date-time
        closed_at:
          type: string
          format: date-time
          nullable: true
        total_sales:
          type: number
          nullable: true
        total_items:
          type: integer
          nullable: true
        number_of_sales:
          type: integer
          nullable: true
        total_donations:
          type: number
          nullable: true
        total_weight_out:
          type: number
          nullable: true
        closing_amount:
          type: number
          nullable: true
        actual_amount:
          type: number
          nullable: true
        variance:
          type: number
          nullable: true
        variance_comment:
          type: string
          nullable: true
        report_download_url:
          type: string
          nullable: true
        report_email_sent:
          type: boolean
          nullable: true
        register_options:
          type: object
          nullable: true
          additionalProperties: true
        totals:
          allOf:
            - $ref: "#/components/schemas/CashSessionTotalsV1"
          nullable: true
      additionalProperties: true
    CashSessionDetailResponseV1:
      allOf:
        - $ref: "#/components/schemas/CashSessionResponse"
      type: object
      description: |
        Réponse GET détail session — champs supplémentaires (ventes, libellés opérateur/site).
      properties:
        sales:
          type: array
          items:
            $ref: "#/components/schemas/SaleResponseV1"
        operator_name:
          type: string
          nullable: true
        site_name:
          type: string
          nullable: true
      additionalProperties: true
    LoginRequestV2:
      type: object
      required:
        - username
        - password
      properties:
        username:
          type: string
        password:
          type: string
          format: password
        use_web_session_cookies:
          type: boolean
          default: false
          description: Si true, pose les cookies httpOnly en plus du JSON (parcours web v2).
      additionalProperties: false
    AuthUserV2:
      type: object
      properties:
        id:
          type: string
        username:
          type: string
          nullable: true
        first_name:
          type: string
          nullable: true
        last_name:
          type: string
          nullable: true
        role:
          type: string
        status:
          type: string
          nullable: true
        is_active:
          type: boolean
        created_at:
          type: string
          format: date-time
          nullable: true
        updated_at:
          type: string
          format: date-time
          nullable: true
      additionalProperties: false
    LoginResponseV2:
      type: object
      required:
        - access_token
        - token_type
        - user
      properties:
        access_token:
          type: string
        refresh_token:
          type: string
          nullable: true
        token_type:
          type: string
        expires_in:
          type: integer
          nullable: true
        user:
          $ref: "#/components/schemas/AuthUserV2"
      additionalProperties: false
    RefreshTokenRequestV2:
      type: object
      properties:
        refresh_token:
          type: string
          nullable: true
          description: Si absent, lecture du cookie httpOnly de refresh (même client same-origin).
      additionalProperties: false
    RefreshTokenResponseV2:
      type: object
      required:
        - access_token
        - refresh_token
        - token_type
        - expires_in
      properties:
        access_token:
          type: string
        refresh_token:
          type: string
        token_type:
          type: string
        expires_in:
          type: integer
      additionalProperties: false
    SyncStateCore:
      type: string
      description: |
        Noyau d'etats de synchronisation operation (FR24, Story 1.5). Ne pas etendre la semantique metier sans version de contrat.
        Reference : references/artefacts/2026-04-02_05_contrat-minimal-sync-reconciliation-paheko.md
      enum:
        - a_reessayer
        - en_quarantaine
        - resolu
        - rejete
    ContextRuntimeState:
      type: string
      description: |
        État runtime UI pour le périmètre exploitation (spec 1.3 §4.2).
        - ok : affectation site minimale cohérente avec les sessions ouvertes connues.
        - degraded : contexte incomplet (ex. site non affecté) ou incohérent (ex. session caisse sur autre site) — pas d'expansion silencieuse des droits.
        - forbidden : compte refusé pour l'exploitation ; pas d'ids exposés (`context` null).
      enum:
        - ok
        - degraded
        - forbidden
    ContextEnvelope:
      type: object
      required:
        - runtime_state
        - permission_keys
        - computed_at
      description: |
        Enveloppe canonique backend (AR39). Story 2.2 : minimal ; Story 2.3 enrichit le calcul de `permission_keys`.
        Story 5.5 : `presentation_labels` (optionnel) porte uniquement de la présentation pour résoudre des `label_key` CREOS ;
        ne remplace ni permissions, ni routes, ni `page_key`. Rétrocompat : champs optionnels, clients existants ignorables.
      properties:
        runtime_state:
          $ref: "#/components/schemas/ContextRuntimeState"
        context:
          allOf:
            - $ref: "#/components/schemas/ExploitationContextIds"
          nullable: true
        permission_keys:
          type: array
          items:
            type: string
          description: |
            Clés de permission effectives à l'instant `computed_at` (union additive Story 2.3 ;
            aligné sur `GET /v1/users/me/permissions` pour le même utilisateur et session).
            **Story 6.8** : la clé `caisse.sale_correct` est ajoutée côté serveur uniquement pour les profils
            **super-admin** (surface UI correction vente ; l'endpoint reste toutefois contrôlé par rôle serveur).
        computed_at:
          type: string
          format: date-time
          description: Horodatage serveur autoritaire.
        restriction_message:
          type: string
          nullable: true
          description: Détail lisible pour `degraded` / `forbidden` (diagnostic UI, non normatif pour l'autorisation).
        presentation_labels:
          type: object
          nullable: true
          description: |
            Map `label_key` (declare dans les manifests CREOS, ex. navigation) vers libelle affichable UTF-8.
            Presentation uniquement : le runtime n'utilise pas ce champ pour autoriser ou masquer des entrees.
          additionalProperties:
            type: string
      additionalProperties: false
    ExploitationContextIds:
      type: object
      description: Identifiants de contexte visibles (alignement Story 1.3, ContextEnvelope lorsque exposes au client).
      properties:
        site_id:
          type: string
        cash_register_id:
          type: string
        cash_session_id:
          type: string
          nullable: true
        reception_post_id:
          type: string
          nullable: true
      additionalProperties: false
    ExploitationLiveSnapshot:
      type: object
      description: |
        **Contrat gelé (Story 2.6 — codegen / types partagés)** : présence des champs nommés ci-dessous,
        types des enums `SyncStateCore` et `cash_session_effectiveness`, structure de `context` via
        `ExploitationContextIds`, champ `observed_at` (date-time ISO 8601), et cohérence `sync_operational_summary`
        quand l'objet est non null (sous-objet minimal `worst_state` + `source_reachable`).

        **Complété Story 2.7 (sémantique HTTP + agrégats)** : `daily_kpis_aggregate` reprend les clés de
        `UnifiedLiveStatsResponse` / `GET /v1/stats/live` (période `daily` côté impl) : `tickets_count`,
        `last_ticket_amount`, `ca`, `donations`, `weight_out_sales`, `tickets_open`, `tickets_closed_24h`,
        `items_received`, `weight_in`, `weight_out`, `period_start`, `period_end` (date-time ISO en JSON).
        `effective_open_state` : codes stables `open`, `closed`, `unknown`, `not_applicable`, et pour F2
        `delayed_open` / `delayed_close` lorsque `sites.configuration.opening_exception` le porte.
        Runtime `forbidden` : `context` omis, `daily_kpis_aggregate` null, `sync_operational_summary` null,
        `cash_session_effectiveness` = `unknown` (pas d'inference silencieuse UX-DR15).

        **Story 4.5** : `bandeau_live_slice_enabled` — vérité `sites.configuration.bandeau_live_slice_enabled`
        (defaut true si absent). Si `false`, pas d'agrégats KPIs dans cette réponse ; champs d'état
        alignés sur une surface minimale (`not_applicable`, sync null).

        Absence vs null : artefact 1.7 section 6.
      properties:
        bandeau_live_slice_enabled:
          type: boolean
          description: |
            True = slice actif ; False = désactivé par admin (config site). Defaut cote client si cle absente du JSON : true.
        daily_kpis_aggregate:
          type: object
          nullable: true
          description: |
            KPIs jour agreges (multi-sites, multi-caisses), meme esprit bandeau recyclique 1.4.4 — voir artefact 07 §1 bis.
            Clefs figees Story 2.7 : alignement `UnifiedLiveStatsResponse` (meme moteur que `ReceptionLiveStatsService.get_unified_live_stats`, perimetre site quand `context.site_id` est connu). Snapshot JSON 1.4.4 : references/artefacts/2026-04-02_08_openapi-recyclique-live-recyclic-local.json (lecture seule, pas contrat v2).
          additionalProperties: true
        context:
          $ref: "#/components/schemas/ExploitationContextIds"
        effective_open_state:
          type: string
          description: |
            Verite metier fenetre d'ouverture effective au sens terrain (backend, famille F1/F3).
            F2 (ouverture decalee / exception) : `delayed_open` / `delayed_close` lorsque la regle serveur
            les calcule (ex. hint `sites.configuration.opening_exception`).
        cash_session_effectiveness:
          type: string
          description: |
            Distinct de la simple selection de contexte (UX-DR15). Jamais infere depuis l'existence d'une entite caisse seule.
          enum:
            - open_effective
            - closed_effective
            - unknown
            - not_applicable
        sync_operational_summary:
          type: object
          nullable: true
          description: Famille F4 — observabilite sans redefinir FR24.
          properties:
            worst_state:
              $ref: "#/components/schemas/SyncStateCore"
            source_reachable:
              type: boolean
          additionalProperties: false
        observed_at:
          type: string
          format: date-time
          description: Horodatage serveur autoritaire pour affichage coherent (AR39).
      additionalProperties: false
    BandeauLiveSliceToggleRequest:
      type: object
      additionalProperties: false
      required:
        - enabled
      properties:
        enabled:
          type: boolean
          description: True pour reactiver le slice bandeau live sur le site courant ; False pour le couper.
    BandeauLiveSliceToggleResponse:
      type: object
      additionalProperties: false
      required:
        - bandeau_live_slice_enabled
        - site_id
      properties:
        bandeau_live_slice_enabled:
          type: boolean
        site_id:
          type: string
          description: UUID du site mis a jour
    SaleItemCreateV1:
      type: object
      required:
        - category
        - quantity
        - weight
        - unit_price
        - total_price
      properties:
        category:
          type: string
        quantity:
          type: integer
          minimum: 1
        weight:
          type: number
        unit_price:
          type: number
        total_price:
          type: number
        preset_id:
          type: string
          format: uuid
          nullable: true
        notes:
          type: string
          nullable: true
      additionalProperties: false
    SaleLifecycleStatusV1:
      type: string
      enum:
        - completed
        - held
        - abandoned
      description: Cycle de vie vente caisse (Story 6.3).
    SpecialEncaissementKindV1:
      type: string
      enum:
        - DON_SANS_ARTICLE
        - ADHESION_ASSOCIATION
      description: |
        Story 6.5 — discriminant API pour encaissements sans lignes article. `DON_SANS_ARTICLE` : total ≥ 0, pas de `adherent_reference`.
        `ADHESION_ASSOCIATION` : total > 0 ; `adherent_reference` optionnel (max 200 caractères).
        Mutuellement exclusif avec `social_action_kind` (Story 6.6).
    SocialActionKindV1:
      type: string
      enum:
        - DON_LIBRE
        - DON_MOINS_18
        - MARAUDE
        - KIT_INSTALLATION_ETUDIANT
        - DON_AUX_ANIMAUX
        - FRIPERIE_AUTO_GEREE
      description: |
        Story 6.6 — lot 1 figé des actions sociales / solidaires (distinct de `SpecialEncaissementKindV1`).
        Toujours `items` = [] et `total_amount` > 0 ; `note` optionnelle. Mutuellement exclusif avec `special_encaissement_kind`.
    PaymentCreateV1:
      type: object
      required:
        - payment_method
        - amount
      properties:
        payment_method:
          type: string
          description: Enum métier aligné modèle Sale (cash, card, …)
        amount:
          type: number
      additionalProperties: false
    SaleHoldCreateV1:
      type: object
      required:
        - cash_session_id
        - items
        - total_amount
      properties:
        cash_session_id:
          type: string
          format: uuid
        items:
          type: array
          items:
            $ref: "#/components/schemas/SaleItemCreateV1"
        total_amount:
          type: number
        donation:
          type: number
          nullable: true
        note:
          type: string
          nullable: true
      additionalProperties: false
    SaleFinalizeHeldV1:
      type: object
      properties:
        donation:
          type: number
          nullable: true
        payment_method:
          type: string
          nullable: true
        payments:
          type: array
          items:
            $ref: "#/components/schemas/PaymentCreateV1"
          nullable: true
        note:
          type: string
          nullable: true
      additionalProperties: false
    SaleCreateV1:
      type: object
      required:
        - cash_session_id
        - total_amount
      description: |
        Vente nominale : au moins une ligne dans `items`. Encaissement spécial (Story 6.5) : `special_encaissement_kind` renseigné et `items` = [].
        Action sociale (Story 6.6) : `social_action_kind` renseigné et `items` = [] (exclusif de `special_encaissement_kind`).
      properties:
        cash_session_id:
          type: string
          format: uuid
        items:
          type: array
          items:
            $ref: "#/components/schemas/SaleItemCreateV1"
          description: Vide si et seulement si `special_encaissement_kind` ou `social_action_kind` est défini.
        total_amount:
          type: number
        donation:
          type: number
          nullable: true
        payment_method:
          type: string
          nullable: true
        payments:
          type: array
          items:
            $ref: "#/components/schemas/PaymentCreateV1"
          nullable: true
        note:
          type: string
          nullable: true
        special_encaissement_kind:
          allOf:
            - $ref: "#/components/schemas/SpecialEncaissementKindV1"
          nullable: true
        social_action_kind:
          allOf:
            - $ref: "#/components/schemas/SocialActionKindV1"
          nullable: true
        adherent_reference:
          type: string
          maxLength: 200
          nullable: true
          description: Réservé à `ADHESION_ASSOCIATION` (nom ou note courte, optionnel).
      additionalProperties: false
    PaymentResponseV1:
      type: object
      required:
        - id
        - sale_id
        - payment_method
        - amount
        - created_at
      properties:
        id:
          type: string
        sale_id:
          type: string
        payment_method:
          type: string
        amount:
          type: number
        created_at:
          type: string
          format: date-time
      additionalProperties: false
    SaleItemResponseV1:
      allOf:
        - $ref: "#/components/schemas/SaleItemCreateV1"
        - type: object
          required:
            - id
            - sale_id
          properties:
            id:
              type: string
            sale_id:
              type: string
          additionalProperties: false
    SaleResponseV1:
      type: object
      required:
        - id
        - cash_session_id
        - total_amount
        - lifecycle_status
        - created_at
        - updated_at
        - items
        - payments
      properties:
        id:
          type: string
        cash_session_id:
          type: string
        operator_id:
          type: string
          nullable: true
        lifecycle_status:
          $ref: "#/components/schemas/SaleLifecycleStatusV1"
        total_amount:
          type: number
        donation:
          type: number
          nullable: true
        payment_method:
          type: string
          nullable: true
        note:
          type: string
          nullable: true
        sale_date:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        items:
          type: array
          items:
            $ref: "#/components/schemas/SaleItemResponseV1"
        payments:
          type: array
          items:
            $ref: "#/components/schemas/PaymentResponseV1"
        special_encaissement_kind:
          allOf:
            - $ref: "#/components/schemas/SpecialEncaissementKindV1"
          nullable: true
        social_action_kind:
          allOf:
            - $ref: "#/components/schemas/SocialActionKindV1"
          nullable: true
        adherent_reference:
          type: string
          nullable: true
      additionalProperties: false
    RefundReasonCodeV1:
      type: string
      enum:
        - ERREUR_SAISIE
        - RETOUR_ARTICLE
        - ANNULATION_CLIENT
        - AUTRE
      description: Motif de remboursement (Story 6.4).
    SaleCorrectionSaleDateV1:
      type: object
      required:
        - kind
        - sale_date
        - reason
      properties:
        kind:
          type: string
          enum:
            - sale_date
        sale_date:
          type: string
          format: date-time
          description: Nouvelle date/heure réelle du ticket (B52-P3).
        reason:
          type: string
          minLength: 1
          maxLength: 2000
          description: Motif obligatoire (audit).
      additionalProperties: false
    SaleCorrectionFinalizeFieldsV1:
      type: object
      required:
        - kind
        - reason
      properties:
        kind:
          type: string
          enum:
            - finalize_fields
        donation:
          type: number
          nullable: true
        total_amount:
