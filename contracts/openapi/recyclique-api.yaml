openapi: 3.1.0
info:
  title: Recyclique API v2
  version: 0.1.9-draft
  description: |
    Fichier OpenAPI reviewable (draft) — **Piste B**.
    `Recyclique` est le writer canonique : la generation depuis le code FastAPI doit
    alimenter ce document (ou le remplacer) sans edition manuelle des chemins d'implementation.
    Chaque operation expose un `operationId` **stable** ; les manifests CREOS referencent
    ces identifiants via `data_contract.operation_id` (voir instruction contrats donnees).

    **Versionnement semver (draft)** : increment **minor** pour ajouts retro-compatibles
    (nouveaux champs optionnels, nouvelles operations non breaking). Increment **major** ou
    procedure **B4** (journal + refs manifests/tests) pour toute rupture de schéma public ou
    renommage d'`operationId`. Voir `contracts/README.md` et pivot gouvernance §0.1 B4.
servers:
  - url: /api
    description: Prefixe nominal v2 (ajuster selon deploiement)
# Gate CI (Epic 10) : lorsque ce fichier contient des operations, verifier que chaque
# data_contract.operation_id des manifests CREOS reviewables a un operationId ici.
paths:
  /v1/auth/login:
    post:
      operationId: recyclique_auth_login
      tags:
        - auth
      summary: Connexion mot de passe web (socle session v2)
      description: |
        Autorité backend exclusive (Epic 2.1). Réponse JSON inchangée pour clients legacy (access_token, refresh_token optionnel).
        Si `use_web_session_cookies` est true : en plus du JSON, pose des cookies **httpOnly** (`recyclique_access`, `recyclique_refresh` par défaut — noms configurables côté serveur).
        **Same-origin** recommandé ; `SameSite=Lax` par défaut. CSRF : politique projet / Story 2.4+ ; ne pas inférer la vérité contextuelle côté UI (Epic 3).
        Le flux **PIN métier** reste sur `POST /v1/auth/pin` (distinct du mot de passe web, spec 1.3).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequestV2"
      responses:
        "200":
          description: OK — peut inclure des en-têtes Set-Cookie si use_web_session_cookies
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponseV2"
        "401":
          description: Identifiants invalides ou utilisateur inactif
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecycliqueApiError"
        "422":
          description: Corps JSON invalide (validation Pydantic)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecycliqueApiError"
  /v1/auth/logout:
    post:
      operationId: recyclique_auth_logout
      tags:
        - auth
      summary: Déconnexion (révoque sessions refresh côté serveur)
      description: |
        Nécessite un JWT valide (Bearer **ou** cookie d'accès v2). Révoque les refresh tokens persistés ; envoie `Set-Cookie` d’expiration pour les cookies de session web si présents.
      security:
        - bearerOrCookie: []
      responses:
        "200":
          description: Déconnexion réussie
        "401":
          description: Non authentifié
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecycliqueApiError"
  /v1/auth/refresh:
    post:
      operationId: recyclique_auth_refresh
      tags:
        - auth
      summary: Rotation access + refresh
      description: |
        Accepte le refresh token dans le corps **ou** le cookie httpOnly (transport web v2). Si le refresh provenait du cookie, la réponse 200 inclut de nouveaux Set-Cookie.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshTokenRequestV2"
      responses:
        "200":
          description: Nouveaux jetons
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RefreshTokenResponseV2"
        "401":
          description: Refresh invalide ou expiré
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecycliqueApiError"
        "403":
          description: Inactivité trop longue
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecycliqueApiError"
        "422":
          description: Refresh absent (corps et cookie)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecycliqueApiError"
  /v1/users/me/context:
    get:
      operationId: recyclique_users_getContextEnvelope
      tags:
        - users
        - context
      summary: ContextEnvelope courant (autorité serveur)
      description: |
        Story 2.2 : agrégation site / caisse / session caisse / poste réception + `runtime_state` (`ok` | `degraded` | `forbidden`)
        + `permission_keys` : union exhaustive additive (rôles ADMIN/SUPER_ADMIN + groupes dans le périmètre
        site actif ; voir Story 2.3), alignée sur `GET /v1/users/me/permissions`.
        Le client ne reconstruit pas l'enveloppe depuis des manifests ; il consomme cette réponse.
        Lecture toujours recalculée depuis la base (pas d'inférence silencieuse).
      security:
        - bearerOrCookie: []
      responses:
        "200":
          description: Enveloppe de contexte
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContextEnvelope"
        "401":
          description: Non authentifié
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecycliqueApiError"
  /v1/users/me/context/refresh:
    post:
      operationId: recyclique_users_refreshContextEnvelope
      tags:
        - users
        - context
      summary: Rafraîchissement explicite du ContextEnvelope
      description: |
        Recalcul serveur après changement de site, caisse, session ou poste (spec 1.3 §4.2).
        Même charge utile que `GET /v1/users/me/context` ; endpoint dédié pour que le client déclenche
        explicitement un nouveau calcul sans supposer de mise à jour silencieuse.
      security:
        - bearerOrCookie: []
      responses:
        "200":
          description: Enveloppe recalculée
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContextEnvelope"
        "401":
          description: Non authentifié
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecycliqueApiError"
  /v1/users/me/permissions:
    get:
      operationId: recyclique_users_getMyPermissions
      tags:
        - users
      summary: Permissions effectives courantes (autorité serveur)
      description: |
        Liste des clés de permission (`permission_keys`) calculées comme pour `ContextEnvelope.permission_keys`
        (même moteur additif Story 2.3 : union groupes dans le périmètre site + règles de rôle).
        Le client n'invente pas de permissions ; consommation par Peintre_nano / UI en lecture seule.
      security:
        - bearerOrCookie: []
      responses:
        "200":
          description: Objet contenant la liste des clés (champ `permissions`)
          content:
            application/json:
              schema:
                type: object
                required:
                  - permissions
                properties:
                  permissions:
                    type: array
                    items:
                      type: string
                    description: Clés stables (ex. caisse.access), même jeu que ContextEnvelope.permission_keys pour la même session DB.
                additionalProperties: false
        "401":
          description: Non authentifié
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecycliqueApiError"
  /v1/cash-sessions/current:
    get:
      operationId: recyclique_cashSessions_getCurrentOpenSession
      tags:
        - cash-sessions
      summary: Session de caisse ouverte pour l'utilisateur authentifié
      description: |
        Retourne la session ouverte (non différée) de l’opérateur connecté, **enrichie**
        (totaux Story 6.4, dons, poids sorti, etc.) — aligné sur `get_current_cash_session` backend.
        Réponse **`null`** (JSON) si aucune session ouverte : cas normal, pas une erreur HTTP.
      security:
        - bearerOrCookie: []
      responses:
        "200":
          description: Session enrichie ou absence de session (`null`)
          content:
            application/json:
              schema:
                oneOf:
                  - type: "null"
                  - $ref: "#/components/schemas/CashSessionResponse"
        "401":
          description: Non authentifié
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecycliqueApiError"
  /v1/cash-sessions/{session_id}:
    get:
      operationId: recyclique_cashSessions_getSessionDetail
      tags:
        - cash-sessions
      summary: Détail d'une session de caisse (admin) avec ventes
      description: |
        Journal session — aligné brownfield `/admin/cash-sessions/:id` (Story 6.8).
        Permissions typiques : ADMIN ou SUPER_ADMIN (backend autoritaire).
      security:
        - bearerOrCookie: []
      parameters:
        - name: session_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Session enrichie et liste des ventes
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CashSessionDetailResponseV1"
        "401":
          description: Non authentifié
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecycliqueApiError"
        "403":
          description: Accès refusé
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecycliqueApiError"
        "404":
          description: Session introuvable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecycliqueApiError"
  /v1/cash-sessions/{session_id}/close:
    post:
      operationId: recyclique_cashSessions_closeSession
      tags:
        - cash-sessions
      summary: Fermer une session de caisse (step-up PIN + idempotence)
      description: |
        Story 2.4 : mutation sensible — **preuve serveur** obligatoire via en-tête `X-Step-Up-Pin`
        (jamais journalisée en clair). Idempotence optionnelle : `Idempotency-Key` + même corps →
        réponse rejouée ; corps différent avec la même clé → **409** (`IDEMPOTENCY_KEY_CONFLICT`).
        Corrélation : `X-Request-Id` (réponse reprend l’identifiant client ou un UUID serveur).

        Story 6.7 : si au moins une vente `lifecycle_status` **held** existe pour la session,
        réponse **400** avec enveloppe AR21, `code` **`CASH_SESSION_CLOSE_HELD_PENDING`** (pas de clôture
        tant que des tickets sont en attente — aligné Story 6.3).
      security:
        - bearerOrCookie: []
      parameters:
        - name: session_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: X-Step-Up-Pin
          in: header
          required: true
          schema:
            type: string
          description: PIN opérateur (4 chiffres) — preuve step-up ; ne pas logger.
        - name: Idempotency-Key
          in: header
          required: false
          schema:
            type: string
          description: Clé client pour éviter doubles effets (Redis, TTL 24h).
        - name: X-Request-Id
          in: header
          required: false
          schema:
            type: string
          description: Identifiant de corrélation ; renvoyé tel quel ou complété par le serveur.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CashSessionCloseBody"
      responses:
        "200":
          description: Session fermée (ou session vide supprimée — corps `deleted`)
        "400":
          description: |
            Erreur métier / validation fermeture. Codes métier possibles : `CASH_SESSION_CLOSE_HELD_PENDING`
            (tickets en attente), écart sans commentaire, session déjà fermée, etc.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecycliqueApiError"
        "401":
          description: Non authentifié
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecycliqueApiError"
        "403":
          description: Step-up PIN manquant, invalide, ou PIN non configuré — codes `STEP_UP_PIN_*`
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecycliqueApiError"
        "404":
          description: Session introuvable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecycliqueApiError"
        "409":
          description: Conflit idempotence — `IDEMPOTENCY_KEY_CONFLICT`
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecycliqueApiError"
        "422":
          description: Corps JSON invalide
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecycliqueApiError"
        "429":
          description: Verrouillage temporaire après échecs PIN répétés — `STEP_UP_LOCKED`
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecycliqueApiError"
  /v2/_contract-governance/ping:
    get:
      operationId: recyclique_contractGovernance_ping
      tags:
        - governance
      summary: Point d'ancrage illustratif (Story 1.4)
      description: |
        Operation d'exemple pour documenter la regle des operationId stables et le lien
        data_contract.operation_id. Ne presuppose pas un endpoint reel deploye ; a retirer
        ou remplacer lorsque les paths metier v2 seront definis (Epic 2+).
      responses:
        "200":
          description: Reponse minimale illustrative
  /v2/exploitation/live-snapshot:
    get:
      operationId: recyclique_exploitation_getLiveSnapshot
      tags:
        - exploitation
      summary: Instantane signaux exploitation pour bandeau live (ancrage contractuel Epic 4 / Story 4.1)
      description: |
        **Ancrage reviewable (Story 4.1)** : contrat HTTP minimal du slice « bandeau live ». Les manifests CREOS sous
        `contracts/creos/manifests/` referencent cette operation via `data_contract.operation_id` =
        `recyclique_exploitation_getLiveSnapshot` (meme chaine que l'`operationId` ci-dessus — regle B4 : pas de renommage
        sans mise a jour des manifests et du codegen).

        Semantique des champs : references/artefacts/2026-04-02_07_signaux-exploitation-bandeau-live-premiers-slices.md
        (§1 bis perimetre v1 KPIs agreges, §7 daily_kpis_aggregate).
        Premier bandeau v2 : meme esprit que recyclique-1.4.4 (KPIs jour globaux, agrege multi-sites/caisses) ; familles
        F1-F6 optionnelles ou enrichissements ulterieurs.
        Schema `ExploitationLiveSnapshot` : perimetre gele / complete selon Stories 2.6 et 2.7 (null et degradations — artefact 1.7 §6).
        Implementation HTTP reelle, auth et persistance : Epic 2.7 / Epic 2.2 (ne pas dupliquer la semantique sync Story 1.5).
        Auth : meme modele que `GET /v1/users/me/context` (Bearer et/ou cookie httpOnly) — acces exploitation, pas reserve admin seul.
      security:
        - bearerOrCookie: []
      parameters:
        - name: X-Correlation-ID
          in: header
          required: false
          description: |
            Identifiant de correlation optionnel cote client ; a propager pour le support et l'alignement des journaux
            inter-couches (exigence pour les stories 4.3 et 4.6 — convergence bout-en-bout). Les reponses d'erreur
            peuvent reprendre la correlation via `correlation_id` dans `RecycliqueApiError`.
          schema:
            type: string
      responses:
        "200":
          description: Snapshot exploitation — champs optionnels selon degradations (voir artefact 1.7)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExploitationLiveSnapshot"
        "401":
          description: Non authentifie
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecycliqueApiError"
        "403":
          description: Credentials absents ou refuses (client strict / futur garde-fou)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecycliqueApiError"
        "503":
          description: Source externe ou agregation indisponible — signal explicite (Story 1.7, Epic 2.7)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecycliqueApiError"
  /v2/exploitation/bandeau-live-slice:
    patch:
      operationId: recyclique_exploitation_patchBandeauLiveSlice
      tags:
        - exploitation
      summary: Activer ou desactiver le slice bandeau live (admin site, Story 4.5)
      description: |
        **Story 4.5** — ecriture bornee : met a jour `sites.configuration.bandeau_live_slice_enabled`
        pour le site de l'utilisateur authentifie. **Roles** : `admin` ou `super-admin` uniquement.
        La lecture publique du drapeau se fait via `GET /v2/exploitation/live-snapshot` (champ
        `bandeau_live_slice_enabled`) — l'`operationId` du GET reste `recyclique_exploitation_getLiveSnapshot` (regle B4).
        Remplacement prevu : Epic 9.6 (config admin simple).
      security:
        - bearerOrCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BandeauLiveSliceToggleRequest"
      responses:
        "200":
          description: Etat persiste
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BandeauLiveSliceToggleResponse"
        "400":
          description: Utilisateur sans site affecte
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecycliqueApiError"
        "401":
          description: Non authentifie
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecycliqueApiError"
        "403":
          description: Role insuffisant
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecycliqueApiError"
        "404":
          description: Site introuvable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecycliqueApiError"
  /v1/sales/held:
    get:
      operationId: recyclique_sales_listHeldSalesForSession
      tags:
        - sales
      summary: Lister les tickets en attente pour une session de caisse
      description: |
        **Story 6.3** — Liste bornée des ventes `lifecycle_status=held` pour la session indiquée.
        Mêmes garde-fous que `POST /v1/sales/` (session ouverte, opérateur, site, `caisse.access`).
      security:
        - bearerOrCookie: []
      parameters:
        - name: cash_session_id
          in: query
          required: true
          schema:
            type: string
            format: uuid
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 50
      responses:
        "200":
          description: Liste des tickets en attente
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SaleResponseV1"
        "400":
          description: Paramètre invalide
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecycliqueApiError"
        "401":
          description: Non authentifié
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecycliqueApiError"
        "403":
          description: Permission / opérateur / site
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecycliqueApiError"
        "404":
          description: Session introuvable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecycliqueApiError"
  /v1/sales/hold:
    post:
      operationId: recyclique_sales_createHeldSale
      tags:
        - sales
      summary: Mettre un panier en attente (ticket suspendu)
      description: |
        **Story 6.3** — Persiste lignes + total sans paiement ; pas d'agrégat `total_sales` de session
        tant que le ticket n'est pas finalisé (`POST .../finalize-held`). Plafond serveur de brouillons par session.
      security:
        - bearerOrCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SaleHoldCreateV1"
      responses:
        "200":
          description: Ticket en attente créé
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SaleResponseV1"
        "400":
          description: Validation totaux / lignes
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecycliqueApiError"
        "401":
          description: Non authentifié
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecycliqueApiError"
        "403":
          description: Opérateur / site / permission
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecycliqueApiError"
        "404":
          description: Session introuvable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecycliqueApiError"
        "422":
          description: Session fermée ou trop de tickets en attente
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecycliqueApiError"
  /v1/sales/reversals:
    post:
      operationId: recyclique_sales_createSaleReversal
      tags:
        - sales
      summary: Enregistrer un remboursement (reversal total)
      description: |
        **Story 6.4** — Crée un document d'avoir / reversal lié à une vente source ``completed`` ;
        montant = total de la vente (remboursement total uniquement). Revalidation session ouverte,
        site, opérateur (6.2) et permission effective **``caisse.refund``** (en plus de ``caisse.access``
        pour les utilisateurs standard). Vente source non modifiée. Idempotence optionnelle via
        ``idempotency_key``. Conflits (double remboursement, ticket ``held``, etc.) → **409**.
      security:
        - bearerOrCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SaleReversalCreateV1"
      responses:
        "200":
          description: Reversal enregistré
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SaleReversalResponseV1"
        "400":
          description: Paramètres invalides
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecycliqueApiError"
        "401":
          description: Non authentifié
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecycliqueApiError"
        "403":
          description: Permission ``caisse.refund`` ou garde-fous caisse
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecycliqueApiError"
        "404":
          description: Vente source introuvable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecycliqueApiError"
        "409":
          description: Conflit métier (déjà remboursé, vente non ``completed``, session fermée, etc.)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecycliqueApiError"
        "422":
          description: Erreur de validation (ex. motif AUTRE sans détail)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecycliqueApiError"
  /v1/sales/reversals/{reversal_id}:
    get:
      operationId: recyclique_sales_getSaleReversal
      tags:
        - sales
      summary: Détail d'un remboursement (reversal)
      description: |
        **Story 6.4** — Lecture si l'utilisateur peut lire la vente source (mêmes règles que
        ``recyclique_sales_getSale``).
      security:
        - bearerOrCookie: []
      parameters:
        - name: reversal_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Reversal trouvé
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SaleReversalResponseV1"
        "400":
          description: Identifiant invalide
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecycliqueApiError"
        "401":
          description: Non authentifié
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecycliqueApiError"
        "403":
          description: Lecture refusée
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecycliqueApiError"
        "404":
          description: Reversal ou vente source introuvable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecycliqueApiError"
  /v1/sales/{sale_id}/corrections:
    patch:
      operationId: recyclique_sales_correctSaleSensitive
      tags:
        - sales
      summary: Correction bornée d'une vente (super-admin, audit)
      description: |
        **Story 6.8** — Lot 1 : liste fermée. Discriminant ``kind`` : ``sale_date`` (date réelle du ticket)
        ou ``finalize_fields`` (uniquement ``donation``, ``total_amount``, ``payment_method``, ``note``).
        **Super-admin** obligatoire ; session de caisse **ouverte** ; refus si remboursement déjà enregistré pour la vente.
        **X-Step-Up-Pin** obligatoire (aligné clôture 6.7). **Idempotency-Key** optionnel (rejouer la même réponse HTTP).
        Le ContextEnvelope n'ajoute la clé effective ``caisse.sale_correct`` que pour les profils super-admin.
      security:
        - bearerOrCookie: []
      parameters:
        - name: sale_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: X-Step-Up-Pin
          in: header
          required: true
          schema:
            type: string
          description: PIN opérateur — preuve step-up ; ne pas logger.
        - name: Idempotency-Key
          in: header
          required: false
          schema:
            type: string
            maxLength: 128
          description: Rejouer la même intention (corps identique) sans effet de bord supplémentaire.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SaleCorrectionCreateV1"
      responses:
        "200":
          description: Vente corrigée
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SaleResponseV1"
        "400":
          description: Validation (champs hors liste, cohérence montants / dates)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecycliqueApiError"
        "401":
          description: Non authentifié
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecycliqueApiError"
        "403":
          description: Rôle non super-admin ou step-up PIN manquant / invalide
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecycliqueApiError"
        "404":
          description: Vente introuvable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecycliqueApiError"
        "409":
          description: Session clôturée, ticket non éligible, remboursement existant, ou conflit idempotence
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecycliqueApiError"
        "429":
          description: Verrouillage step-up PIN (trop de tentatives)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecycliqueApiError"
  /v1/sales/:
    post:
      operationId: recyclique_sales_createSale
      tags:
        - sales
      summary: Créer une vente (parcours caisse nominal v2)
      description: |
        **Stories 6.1 / 6.2 / 6.5** — Mutation sensible : le serveur revalide session ouverte, cohérence des totaux / paiements,
        correspondance opérateur JWT ↔ `cash_sessions.operator_id` (sauf rôles admin / super-admin),
        affectation site ↔ `cash_sessions.site_id`, et permission effective `caisse.access` pour les utilisateurs standard.
        **Story 6.5** : si `special_encaissement_kind` est renseigné (don sans article, adhésion association), `items` doit être `[]`,
        les montants suivent la règle VS (don ≥ 0, adhésion > 0), et la permission effective `caisse.special_encaissement` est exigée en plus du contexte caisse.
        **Story 6.6** : si `social_action_kind` est renseigné (lot actions sociales), `items` doit être `[]`, `total_amount` > 0,
        `special_encaissement_kind` doit être absent (exclusivité mutuelle), et la permission effective `caisse.social_encaissement` est exigée.
        Aligné sur l'implémentation `POST /api/v1/sales/`.
      security:
        - bearerOrCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SaleCreateV1"
      responses:
        "200":
          description: Vente créée
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SaleResponseV1"
        "400":
          description: Validation métier / totaux
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecycliqueApiError"
        "401":
          description: Non authentifié
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecycliqueApiError"
        "403":
          description: >
            Opérateur / site / permission caisse incohérents (messages stables : opérateur, site, `caisse.access`,
            `caisse.special_encaissement` pour encaissements spéciaux Story 6.5, ou `caisse.social_encaissement` pour Story 6.6).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecycliqueApiError"
        "404":
          description: Session de caisse introuvable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecycliqueApiError"
        "422":
          description: Session fermée ou conflit historique (contrat caisse)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecycliqueApiError"
