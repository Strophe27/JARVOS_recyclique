openapi: 3.1.0
info:
  title: Recyclique API v2
  version: 0.1.2-draft
  description: |
    Fichier OpenAPI reviewable (draft) — **Piste B**.
    `Recyclique` est le writer canonique : la generation depuis le code FastAPI doit
    alimenter ce document (ou le remplacer) sans edition manuelle des chemins d'implementation.
    Chaque operation expose un `operationId` **stable** ; les manifests CREOS referencent
    ces identifiants via `data_contract.operation_id` (voir instruction contrats donnees).

    **Versionnement semver (draft)** : increment **minor** pour ajouts retro-compatibles
    (nouveaux champs optionnels, nouvelles operations non breaking). Increment **major** ou
    procedure **B4** (journal + refs manifests/tests) pour toute rupture de schéma public ou
    renommage d'`operationId`. Voir `contracts/README.md` et pivot gouvernance §0.1 B4.
servers:
  - url: /api
    description: Prefixe nominal v2 (ajuster selon deploiement)
# Gate CI (Epic 10) : lorsque ce fichier contient des operations, verifier que chaque
# data_contract.operation_id des manifests CREOS reviewables a un operationId ici.
paths:
  /v1/auth/login:
    post:
      operationId: recyclique_auth_login
      tags:
        - auth
      summary: Connexion mot de passe web (socle session v2)
      description: |
        Autorité backend exclusive (Epic 2.1). Réponse JSON inchangée pour clients legacy (access_token, refresh_token optionnel).
        Si `use_web_session_cookies` est true : en plus du JSON, pose des cookies **httpOnly** (`recyclique_access`, `recyclique_refresh` par défaut — noms configurables côté serveur).
        **Same-origin** recommandé ; `SameSite=Lax` par défaut. CSRF : politique projet / Story 2.4+ ; ne pas inférer la vérité contextuelle côté UI (Epic 3).
        Le flux **PIN métier** reste sur `POST /v1/auth/pin` (distinct du mot de passe web, spec 1.3).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequestV2"
      responses:
        "200":
          description: OK — peut inclure des en-têtes Set-Cookie si use_web_session_cookies
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponseV2"
        "401":
          description: Identifiants invalides ou utilisateur inactif
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecycliqueApiError"
        "422":
          description: Corps JSON invalide (validation Pydantic)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecycliqueApiError"
  /v1/auth/logout:
    post:
      operationId: recyclique_auth_logout
      tags:
        - auth
      summary: Déconnexion (révoque sessions refresh côté serveur)
      description: |
        Nécessite un JWT valide (Bearer **ou** cookie d'accès v2). Révoque les refresh tokens persistés ; envoie `Set-Cookie` d’expiration pour les cookies de session web si présents.
      security:
        - bearerOrCookie: []
      responses:
        "200":
          description: Déconnexion réussie
        "401":
          description: Non authentifié
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecycliqueApiError"
  /v1/auth/refresh:
    post:
      operationId: recyclique_auth_refresh
      tags:
        - auth
      summary: Rotation access + refresh
      description: |
        Accepte le refresh token dans le corps **ou** le cookie httpOnly (transport web v2). Si le refresh provenait du cookie, la réponse 200 inclut de nouveaux Set-Cookie.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshTokenRequestV2"
      responses:
        "200":
          description: Nouveaux jetons
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RefreshTokenResponseV2"
        "401":
          description: Refresh invalide ou expiré
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecycliqueApiError"
        "403":
          description: Inactivité trop longue
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecycliqueApiError"
        "422":
          description: Refresh absent (corps et cookie)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecycliqueApiError"
  /v1/users/me/context:
    get:
      operationId: recyclique_users_getContextEnvelope
      tags:
        - users
        - context
      summary: ContextEnvelope courant (autorité serveur)
      description: |
        Story 2.2 : agrégation site / caisse / session caisse / poste réception + `runtime_state` (`ok` | `degraded` | `forbidden`)
        + `permission_keys` : union exhaustive additive (rôles ADMIN/SUPER_ADMIN + groupes dans le périmètre
        site actif ; voir Story 2.3), alignée sur `GET /v1/users/me/permissions`.
        Le client ne reconstruit pas l'enveloppe depuis des manifests ; il consomme cette réponse.
        Lecture toujours recalculée depuis la base (pas d'inférence silencieuse).
      security:
        - bearerOrCookie: []
      responses:
        "200":
          description: Enveloppe de contexte
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContextEnvelope"
        "401":
          description: Non authentifié
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecycliqueApiError"
  /v1/users/me/context/refresh:
    post:
      operationId: recyclique_users_refreshContextEnvelope
      tags:
        - users
        - context
      summary: Rafraîchissement explicite du ContextEnvelope
      description: |
        Recalcul serveur après changement de site, caisse, session ou poste (spec 1.3 §4.2).
        Même charge utile que `GET /v1/users/me/context` ; endpoint dédié pour que le client déclenche
        explicitement un nouveau calcul sans supposer de mise à jour silencieuse.
      security:
        - bearerOrCookie: []
      responses:
        "200":
          description: Enveloppe recalculée
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContextEnvelope"
        "401":
          description: Non authentifié
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecycliqueApiError"
  /v1/users/me/permissions:
    get:
      operationId: recyclique_users_getMyPermissions
      tags:
        - users
      summary: Permissions effectives courantes (autorité serveur)
      description: |
        Liste des clés de permission (`permission_keys`) calculées comme pour `ContextEnvelope.permission_keys`
        (même moteur additif Story 2.3 : union groupes dans le périmètre site + règles de rôle).
        Le client n'invente pas de permissions ; consommation par Peintre_nano / UI en lecture seule.
      security:
        - bearerOrCookie: []
      responses:
        "200":
          description: Objet contenant la liste des clés (champ `permissions`)
          content:
            application/json:
              schema:
                type: object
                required:
                  - permissions
                properties:
                  permissions:
                    type: array
                    items:
                      type: string
                    description: Clés stables (ex. caisse.access), même jeu que ContextEnvelope.permission_keys pour la même session DB.
                additionalProperties: false
        "401":
          description: Non authentifié
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecycliqueApiError"
  /v1/cash-sessions/{session_id}/close:
    post:
      operationId: recyclique_cashSessions_closeSession
      tags:
        - cash-sessions
      summary: Fermer une session de caisse (step-up PIN + idempotence)
      description: |
        Story 2.4 : mutation sensible — **preuve serveur** obligatoire via en-tête `X-Step-Up-Pin`
        (jamais journalisée en clair). Idempotence optionnelle : `Idempotency-Key` + même corps →
        réponse rejouée ; corps différent avec la même clé → **409** (`IDEMPOTENCY_KEY_CONFLICT`).
        Corrélation : `X-Request-Id` (réponse reprend l’identifiant client ou un UUID serveur).
      security:
        - bearerOrCookie: []
      parameters:
        - name: session_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: X-Step-Up-Pin
          in: header
          required: true
          schema:
            type: string
          description: PIN opérateur (4 chiffres) — preuve step-up ; ne pas logger.
        - name: Idempotency-Key
          in: header
          required: false
          schema:
            type: string
          description: Clé client pour éviter doubles effets (Redis, TTL 24h).
        - name: X-Request-Id
          in: header
          required: false
          schema:
            type: string
          description: Identifiant de corrélation ; renvoyé tel quel ou complété par le serveur.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CashSessionCloseBody"
      responses:
        "200":
          description: Session fermée (ou session vide supprimée — corps `deleted`)
        "400":
          description: Erreur métier / validation fermeture
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecycliqueApiError"
        "401":
          description: Non authentifié
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecycliqueApiError"
        "403":
          description: Step-up PIN manquant, invalide, ou PIN non configuré — codes `STEP_UP_PIN_*`
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecycliqueApiError"
        "404":
          description: Session introuvable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecycliqueApiError"
        "409":
          description: Conflit idempotence — `IDEMPOTENCY_KEY_CONFLICT`
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecycliqueApiError"
        "422":
          description: Corps JSON invalide
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecycliqueApiError"
        "429":
          description: Verrouillage temporaire après échecs PIN répétés — `STEP_UP_LOCKED`
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecycliqueApiError"
  /v2/_contract-governance/ping:
    get:
      operationId: recyclique_contractGovernance_ping
      tags:
        - governance
      summary: Point d'ancrage illustratif (Story 1.4)
      description: |
        Operation d'exemple pour documenter la regle des operationId stables et le lien
        data_contract.operation_id. Ne presuppose pas un endpoint reel deploye ; a retirer
        ou remplacer lorsque les paths metier v2 seront definis (Epic 2+).
      responses:
        "200":
          description: Reponse minimale illustrative
  /v2/exploitation/live-snapshot:
    get:
      operationId: recyclique_exploitation_getLiveSnapshot
      tags:
        - exploitation
      summary: Instantane signaux exploitation pour bandeau live (ancrage contractuel Epic 4 / Story 4.1)
      description: |
        **Ancrage reviewable (Story 4.1)** : contrat HTTP minimal du slice « bandeau live ». Les manifests CREOS sous
        `contracts/creos/manifests/` referencent cette operation via `data_contract.operation_id` =
        `recyclique_exploitation_getLiveSnapshot` (meme chaine que l'`operationId` ci-dessus — regle B4 : pas de renommage
        sans mise a jour des manifests et du codegen).

        Semantique des champs : references/artefacts/2026-04-02_07_signaux-exploitation-bandeau-live-premiers-slices.md
        (§1 bis perimetre v1 KPIs agreges, §7 daily_kpis_aggregate).
        Premier bandeau v2 : meme esprit que recyclique-1.4.4 (KPIs jour globaux, agrege multi-sites/caisses) ; familles
        F1-F6 optionnelles ou enrichissements ulterieurs.
        Schema `ExploitationLiveSnapshot` : perimetre gele / complete selon Stories 2.6 et 2.7 (null et degradations — artefact 1.7 §6).
        Implementation HTTP reelle, auth et persistance : Epic 2.7 / Epic 2.2 (ne pas dupliquer la semantique sync Story 1.5).
        Auth : meme modele que `GET /v1/users/me/context` (Bearer et/ou cookie httpOnly) — acces exploitation, pas reserve admin seul.
      security:
        - bearerOrCookie: []
      parameters:
        - name: X-Correlation-ID
          in: header
          required: false
          description: |
            Identifiant de correlation optionnel cote client ; a propager pour le support et l'alignement des journaux
            inter-couches (exigence pour les stories 4.3 et 4.6 — convergence bout-en-bout). Les reponses d'erreur
            peuvent reprendre la correlation via `correlation_id` dans `RecycliqueApiError`.
          schema:
            type: string
      responses:
        "200":
          description: Snapshot exploitation — champs optionnels selon degradations (voir artefact 1.7)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExploitationLiveSnapshot"
        "401":
          description: Non authentifie
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecycliqueApiError"
        "403":
          description: Credentials absents ou refuses (client strict / futur garde-fou)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecycliqueApiError"
        "503":
          description: Source externe ou agregation indisponible — signal explicite (Story 1.7, Epic 2.7)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecycliqueApiError"
  /v2/exploitation/bandeau-live-slice:
    patch:
      operationId: recyclique_exploitation_patchBandeauLiveSlice
      tags:
        - exploitation
      summary: Activer ou desactiver le slice bandeau live (admin site, Story 4.5)
      description: |
        **Story 4.5** — ecriture bornee : met a jour `sites.configuration.bandeau_live_slice_enabled`
        pour le site de l'utilisateur authentifie. **Roles** : `admin` ou `super-admin` uniquement.
        La lecture publique du drapeau se fait via `GET /v2/exploitation/live-snapshot` (champ
        `bandeau_live_slice_enabled`) — l'`operationId` du GET reste `recyclique_exploitation_getLiveSnapshot` (regle B4).
        Remplacement prevu : Epic 9.6 (config admin simple).
      security:
        - bearerOrCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BandeauLiveSliceToggleRequest"
      responses:
        "200":
          description: Etat persiste
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BandeauLiveSliceToggleResponse"
        "400":
          description: Utilisateur sans site affecte
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecycliqueApiError"
        "401":
          description: Non authentifie
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecycliqueApiError"
        "403":
          description: Role insuffisant
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecycliqueApiError"
        "404":
          description: Site introuvable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecycliqueApiError"
components:
  securitySchemes:
    bearerOrCookie:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        JWT d'accès. Alternative same-origin : cookie httpOnly `recyclique_access` (nom par défaut serveur), sans duplication de la logique d'autorisation côté client.
  schemas:
    RecycliqueApiError:
      type: object
      description: |
        Enveloppe d'erreur JSON stable (AR21). Propriétés en snake_case ; dates ailleurs en ISO 8601.
        Le champ `correlation_id` reprend la valeur de corrélation (alignée sur `X-Request-Id`, Story 2.5).
      required:
        - code
        - detail
        - retryable
        - correlation_id
      properties:
        code:
          type: string
          description: |
            Code machine stable : soit dérivé du statut HTTP (UNAUTHORIZED, NOT_FOUND, …),
            soit code métier explicite pour certaines 403/409/429 (ex. STEP_UP_PIN_REQUIRED,
            IDEMPOTENCY_KEY_CONFLICT, STEP_UP_LOCKED).
        detail:
          description: |
            Message texte (4xx/5xx hors validation) ou liste d'erreurs de validation (422 — équivalent
            ancien corps FastAPI `detail` tableau).
          oneOf:
            - type: string
            - type: array
              items:
                type: object
                additionalProperties: true
        retryable:
          type: boolean
          description: Vrai si un nouvel essai peut réussir (ex. 429, 503).
        state:
          type: string
          nullable: true
          description: État opérationnel optionnel côté domaine ; `null` si non applicable.
        correlation_id:
          type: string
          description: Identifiant pour corrélation support et logs (sans données sensibles).
      additionalProperties: false
    CashSessionCloseBody:
      type: object
      required:
        - actual_amount
      properties:
        actual_amount:
          type: number
          minimum: 0
        variance_comment:
          type: string
          nullable: true
      additionalProperties: false
    LoginRequestV2:
      type: object
      required:
        - username
        - password
      properties:
        username:
          type: string
        password:
          type: string
          format: password
        use_web_session_cookies:
          type: boolean
          default: false
          description: Si true, pose les cookies httpOnly en plus du JSON (parcours web v2).
      additionalProperties: false
    AuthUserV2:
      type: object
      properties:
        id:
          type: string
        username:
          type: string
          nullable: true
        first_name:
          type: string
          nullable: true
        last_name:
          type: string
          nullable: true
        role:
          type: string
        status:
          type: string
          nullable: true
        is_active:
          type: boolean
        created_at:
          type: string
          format: date-time
          nullable: true
        updated_at:
          type: string
          format: date-time
          nullable: true
      additionalProperties: false
    LoginResponseV2:
      type: object
      required:
        - access_token
        - token_type
        - user
      properties:
        access_token:
          type: string
        refresh_token:
          type: string
          nullable: true
        token_type:
          type: string
        expires_in:
          type: integer
          nullable: true
        user:
          $ref: "#/components/schemas/AuthUserV2"
      additionalProperties: false
    RefreshTokenRequestV2:
      type: object
      properties:
        refresh_token:
          type: string
          nullable: true
          description: Si absent, lecture du cookie httpOnly de refresh (même client same-origin).
      additionalProperties: false
    RefreshTokenResponseV2:
      type: object
      required:
        - access_token
        - refresh_token
        - token_type
        - expires_in
      properties:
        access_token:
          type: string
        refresh_token:
          type: string
        token_type:
          type: string
        expires_in:
          type: integer
      additionalProperties: false
    SyncStateCore:
      type: string
      description: |
        Noyau d'etats de synchronisation operation (FR24, Story 1.5). Ne pas etendre la semantique metier sans version de contrat.
        Reference : references/artefacts/2026-04-02_05_contrat-minimal-sync-reconciliation-paheko.md
      enum:
        - a_reessayer
        - en_quarantaine
        - resolu
        - rejete
    ContextRuntimeState:
      type: string
      description: |
        État runtime UI pour le périmètre exploitation (spec 1.3 §4.2).
        - ok : affectation site minimale cohérente avec les sessions ouvertes connues.
        - degraded : contexte incomplet (ex. site non affecté) ou incohérent (ex. session caisse sur autre site) — pas d'expansion silencieuse des droits.
        - forbidden : compte refusé pour l'exploitation ; pas d'ids exposés (`context` null).
      enum:
        - ok
        - degraded
        - forbidden
    ContextEnvelope:
      type: object
      required:
        - runtime_state
        - permission_keys
        - computed_at
      description: |
        Enveloppe canonique backend (AR39). Story 2.2 : minimal ; Story 2.3 enrichit le calcul de `permission_keys`.
        Story 5.5 : `presentation_labels` (optionnel) porte uniquement de la présentation pour résoudre des `label_key` CREOS ;
        ne remplace ni permissions, ni routes, ni `page_key`. Rétrocompat : champs optionnels, clients existants ignorables.
      properties:
        runtime_state:
          $ref: "#/components/schemas/ContextRuntimeState"
        context:
          allOf:
            - $ref: "#/components/schemas/ExploitationContextIds"
          nullable: true
        permission_keys:
          type: array
          items:
            type: string
          description: |
            Clés de permission effectives à l'instant `computed_at` (union additive Story 2.3 ;
            aligné sur `GET /v1/users/me/permissions` pour le même utilisateur et session).
        computed_at:
          type: string
          format: date-time
          description: Horodatage serveur autoritaire.
        restriction_message:
          type: string
          nullable: true
          description: Détail lisible pour `degraded` / `forbidden` (diagnostic UI, non normatif pour l'autorisation).
        presentation_labels:
          type: object
          nullable: true
          description: |
            Map `label_key` (declare dans les manifests CREOS, ex. navigation) vers libelle affichable UTF-8.
            Presentation uniquement : le runtime n'utilise pas ce champ pour autoriser ou masquer des entrees.
          additionalProperties:
            type: string
      additionalProperties: false
    ExploitationContextIds:
      type: object
      description: Identifiants de contexte visibles (alignement Story 1.3, ContextEnvelope lorsque exposes au client).
      properties:
        site_id:
          type: string
        cash_register_id:
          type: string
        cash_session_id:
          type: string
          nullable: true
        reception_post_id:
          type: string
          nullable: true
      additionalProperties: false
    ExploitationLiveSnapshot:
      type: object
      description: |
        **Contrat gelé (Story 2.6 — codegen / types partagés)** : présence des champs nommés ci-dessous,
        types des enums `SyncStateCore` et `cash_session_effectiveness`, structure de `context` via
        `ExploitationContextIds`, champ `observed_at` (date-time ISO 8601), et cohérence `sync_operational_summary`
        quand l'objet est non null (sous-objet minimal `worst_state` + `source_reachable`).

        **Complété Story 2.7 (sémantique HTTP + agrégats)** : `daily_kpis_aggregate` reprend les clés de
        `UnifiedLiveStatsResponse` / `GET /v1/stats/live` (période `daily` côté impl) : `tickets_count`,
        `last_ticket_amount`, `ca`, `donations`, `weight_out_sales`, `tickets_open`, `tickets_closed_24h`,
        `items_received`, `weight_in`, `weight_out`, `period_start`, `period_end` (date-time ISO en JSON).
        `effective_open_state` : codes stables `open`, `closed`, `unknown`, `not_applicable`, et pour F2
        `delayed_open` / `delayed_close` lorsque `sites.configuration.opening_exception` le porte.
        Runtime `forbidden` : `context` omis, `daily_kpis_aggregate` null, `sync_operational_summary` null,
        `cash_session_effectiveness` = `unknown` (pas d'inference silencieuse UX-DR15).

        **Story 4.5** : `bandeau_live_slice_enabled` — vérité `sites.configuration.bandeau_live_slice_enabled`
        (defaut true si absent). Si `false`, pas d'agrégats KPIs dans cette réponse ; champs d'état
        alignés sur une surface minimale (`not_applicable`, sync null).

        Absence vs null : artefact 1.7 section 6.
      properties:
        bandeau_live_slice_enabled:
          type: boolean
          description: |
            True = slice actif ; False = désactivé par admin (config site). Defaut cote client si cle absente du JSON : true.
        daily_kpis_aggregate:
          type: object
          nullable: true
          description: |
            KPIs jour agreges (multi-sites, multi-caisses), meme esprit bandeau recyclique 1.4.4 — voir artefact 07 §1 bis.
            Clefs figees Story 2.7 : alignement `UnifiedLiveStatsResponse` (meme moteur que `ReceptionLiveStatsService.get_unified_live_stats`, perimetre site quand `context.site_id` est connu). Snapshot JSON 1.4.4 : references/artefacts/2026-04-02_08_openapi-recyclique-live-recyclic-local.json (lecture seule, pas contrat v2).
          additionalProperties: true
        context:
          $ref: "#/components/schemas/ExploitationContextIds"
        effective_open_state:
          type: string
          description: |
            Verite metier fenetre d'ouverture effective au sens terrain (backend, famille F1/F3).
            F2 (ouverture decalee / exception) : `delayed_open` / `delayed_close` lorsque la regle serveur
            les calcule (ex. hint `sites.configuration.opening_exception`).
        cash_session_effectiveness:
          type: string
          description: |
            Distinct de la simple selection de contexte (UX-DR15). Jamais infere depuis l'existence d'une entite caisse seule.
          enum:
