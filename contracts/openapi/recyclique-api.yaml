openapi: 3.1.0
info:
  title: Recyclique API v2
  version: 0.1.25-draft
  description: |
    Fichier OpenAPI reviewable (draft) — **Piste B**.
    `Recyclique` est le writer canonique : la generation depuis le code FastAPI doit
    alimenter ce document (ou le remplacer) sans edition manuelle des chemins d'implementation.
    Chaque operation expose un `operationId` **stable** ; les manifests CREOS referencent
    ces identifiants via `data_contract.operation_id` (voir instruction contrats donnees).

    **Versionnement semver (draft)** : increment **minor** pour ajouts retro-compatibles
    (nouveaux champs optionnels, nouvelles operations non breaking). Increment **major** ou
    procedure **B4** (journal + refs manifests/tests) pour toute rupture de schéma public ou
    renommage d'`operationId`. Voir `contracts/README.md` et pivot gouvernance §0.1 B4.
servers:
  - url: /api
    description: Prefixe nominal v2 (ajuster selon deploiement)
# Gate CI (Epic 10) : lorsque ce fichier contient des operations, verifier que chaque
# data_contract.operation_id des manifests CREOS reviewables a un operationId ici.
paths:
  /v1/auth/login:
    post:
      operationId: recyclique_auth_login
      tags:
        - auth
      summary: Connexion mot de passe web (socle session v2)
      description: |
        Autorité backend exclusive (Epic 2.1). Réponse JSON inchangée pour clients legacy (access_token, refresh_token optionnel).
        Si `use_web_session_cookies` est true : en plus du JSON, pose des cookies **httpOnly** (`recyclique_access`, `recyclique_refresh` par défaut — noms configurables côté serveur).
        **Same-origin** recommandé ; `SameSite=Lax` par défaut. CSRF : politique projet / Story 2.4+ ; ne pas inférer la vérité contextuelle côté UI (Epic 3).
        Le flux **PIN métier** reste sur `POST /v1/auth/pin` (distinct du mot de passe web, spec 1.3).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequestV2"
      responses:
        "200":
          description: OK — peut inclure des en-têtes Set-Cookie si use_web_session_cookies
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponseV2"
        "401":
          description: Identifiants invalides ou utilisateur inactif
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecycliqueApiError"
        "422":
          description: Corps JSON invalide (validation Pydantic)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecycliqueApiError"
  /v1/auth/logout:
    post:
      operationId: recyclique_auth_logout
      tags:
        - auth
      summary: Déconnexion (révoque sessions refresh côté serveur)
      description: |
        Nécessite un JWT valide (Bearer **ou** cookie d'accès v2). Révoque les refresh tokens persistés ; envoie `Set-Cookie` d’expiration pour les cookies de session web si présents.
      security:
        - bearerOrCookie: []
      responses:
        "200":
          description: Déconnexion réussie
        "401":
          description: Non authentifié
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecycliqueApiError"
  /v1/auth/refresh:
    post:
      operationId: recyclique_auth_refresh
      tags:
        - auth
      summary: Rotation access + refresh
      description: |
        Accepte le refresh token dans le corps **ou** le cookie httpOnly (transport web v2). Si le refresh provenait du cookie, la réponse 200 inclut de nouveaux Set-Cookie.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshTokenRequestV2"
      responses:
        "200":
          description: Nouveaux jetons
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RefreshTokenResponseV2"
        "401":
          description: Refresh invalide ou expiré
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecycliqueApiError"
        "403":
          description: Inactivité trop longue
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecycliqueApiError"
        "422":
          description: Refresh absent (corps et cookie)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecycliqueApiError"
  /v1/users/me/context:
    get:
      operationId: recyclique_users_getContextEnvelope
      tags:
        - users
        - context
      summary: ContextEnvelope courant (autorité serveur)
      description: |
        Story 2.2 : agrégation site / caisse / session caisse / poste réception + `runtime_state` (`ok` | `degraded` | `forbidden`)
        + `permission_keys` : union exhaustive additive (rôles ADMIN/SUPER_ADMIN + groupes dans le périmètre
        site actif ; voir Story 2.3), alignée sur `GET /v1/users/me/permissions`.
        Le client ne reconstruit pas l'enveloppe depuis des manifests ; il consomme cette réponse.
        Lecture toujours recalculée depuis la base (pas d'inférence silencieuse).
      security:
        - bearerOrCookie: []
      responses:
        "200":
          description: Enveloppe de contexte
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContextEnvelope"
        "401":
          description: Non authentifié
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecycliqueApiError"
  /v1/users/me/context/refresh:
    post:
      operationId: recyclique_users_refreshContextEnvelope
      tags:
        - users
        - context
      summary: Rafraîchissement explicite du ContextEnvelope
      description: |
        Recalcul serveur après changement de site, caisse, session ou poste (spec 1.3 §4.2).
        Même charge utile que `GET /v1/users/me/context` ; endpoint dédié pour que le client déclenche
        explicitement un nouveau calcul sans supposer de mise à jour silencieuse.
      security:
        - bearerOrCookie: []
      responses:
        "200":
          description: Enveloppe recalculée
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContextEnvelope"
        "401":
          description: Non authentifié
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecycliqueApiError"
  /v1/users/me/permissions:
    get:
      operationId: recyclique_users_getMyPermissions
      tags:
        - users
      summary: Permissions effectives courantes (autorité serveur)
      description: |
        Liste des clés de permission (`permission_keys`) calculées comme pour `ContextEnvelope.permission_keys`
        (même moteur additif Story 2.3 : union groupes dans le périmètre site + règles de rôle).
        Le client n'invente pas de permissions ; consommation par Peintre_nano / UI en lecture seule.
      security:
        - bearerOrCookie: []
      responses:
        "200":
          description: Objet contenant la liste des clés (champ `permissions`)
          content:
            application/json:
              schema:
                type: object
                required:
                  - permissions
                properties:
                  permissions:
                    type: array
                    items:
                      type: string
                    description: Clés stables (ex. caisse.access), même jeu que ContextEnvelope.permission_keys pour la même session DB.
                additionalProperties: false
        "401":
          description: Non authentifié
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecycliqueApiError"
  /v1/users/:
    get:
      operationId: recyclique_users_listUsers
      tags:
        - users
        - admin
      summary: Liste des utilisateurs (admin)
      description: |
        **G-OA-03** (Story 16.1) : session authentifiée **et** rôle ADMIN ou SUPER_ADMIN requis (`require_admin_role`).
        Trace : `references/artefacts/2026-04-12_01_cartographie-api-permissions-contextes-admin-legacy-15-2.md` section 4.
        Même famille d'autorité que `GET /v1/admin/users` (lecture admin).
      security:
        - bearerOrCookie: []
      parameters:
        - name: skip
          in: query
          required: false
          schema:
            type: integer
            minimum: 0
            default: 0
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 1000
            default: 100
      responses:
        "200":
          description: Liste des utilisateurs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/UserV1Response"
        "401":
          description: Non authentifié
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecycliqueApiError"
        "403":
          description: Authentifié mais sans rôle administrateur
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecycliqueApiError"
    post:
      operationId: recyclique_users_createUser
      tags:
        - users
      summary: Création d'un compte utilisateur
      description: |
        Handler FastAPI `POST /v1/users/` (corps `UserCreate`). Mot de passe obligatoire ; champs optionnels alignés sur le modèle ORM.
        **Sécurité** : l'implémentation actuelle n'exige pas de JWT sur cette route ; l'UI admin legacy l'appelle depuis une session authentifiée. Durcissement serveur possible ultérieurement.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserCreateV1Request"
      responses:
        "200":
          description: Compte créé
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserV1Response"
        "400":
          description: Données invalides (ex. mot de passe ou identifiant)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecycliqueApiError"
        "409":
          description: Courriel ou ressource en conflit
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecycliqueApiError"
        "500":
          description: Erreur serveur
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecycliqueApiError"
  /v1/users/{user_id}:
    get:
      operationId: recyclique_users_getUserById
      tags:
        - users
        - admin
      summary: Détail utilisateur par id (admin)
      description: |
        **G-OA-03** (Story 16.1) : `require_admin_role` sur la route ; fermeture gap sécurité liste/détail users.
        Trace : `references/artefacts/2026-04-12_01_cartographie-api-permissions-contextes-admin-legacy-15-2.md` section 4.
      security:
        - bearerOrCookie: []
      parameters:
        - name: user_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Utilisateur trouvé
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserV1Response"
        "401":
          description: Non authentifié
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecycliqueApiError"
        "403":
          description: Authentifié mais sans rôle administrateur
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecycliqueApiError"
        "404":
          description: Utilisateur inconnu
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecycliqueApiError"
    put:
      operationId: recyclique_users_updateUser
      tags:
        - users
        - admin
      summary: Mise à jour d'un compte (champs profil et rôle)
      description: |
        Handler FastAPI `PUT /v1/users/{user_id}` avec corps `UserUpdate` (champs partiels). Aligné sur le client admin legacy (`UsersApi.userv1usersuseridput`).
        **Sécurité** : l'implémentation actuelle n'exige pas de JWT sur cette route ; l'UI admin envoie le jeton de session comme le legacy.
      security:
        - bearerOrCookie: []
      parameters:
        - name: user_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserUpdateV1Request"
      responses:
        "200":
          description: Compte mis à jour
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserV1Response"
        "404":
          description: Utilisateur inconnu
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecycliqueApiError"
        "409":
          description: Conflit (ex. courriel déjà utilisé)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecycliqueApiError"
        "500":
          description: Erreur serveur
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecycliqueApiError"
  /v1/cash-sessions/:
    get:
      operationId: recyclique_cashSessions_listSessions
      tags:
        - cash-sessions
        - admin
      summary: Liste paginée des sessions de caisse (admin / supervision)
      description: |
        **Backend** : `GET /v1/cash-sessions/` — même implémentation que Recyclique 1.4.4 (filtres + pagination).
        Rôles autorisés côté route : USER, ADMIN, SUPER_ADMIN (`require_role_strict`) ; le service applique
        le filtrage métier (périmètre site, etc.).
      security:
        - bearerOrCookie: []
      parameters:
        - name: skip
          in: query
          required: false
          schema:
            type: integer
            minimum: 0
            default: 0
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum:
              - open
              - closed
        - name: operator_id
          in: query
          required: false
          schema:
            type: string
        - name: site_id
          in: query
          required: false
          schema:
            type: string
        - name: date_from
          in: query
          required: false
          schema:
            type: string
            format: date-time
        - name: date_to
          in: query
          required: false
          schema:
            type: string
            format: date-time
        - name: search
          in: query
          required: false
          schema:
            type: string
        - name: include_empty
          in: query
          required: false
          schema:
            type: boolean
            default: false
        - name: amount_min
          in: query
          required: false
          schema:
            type: number
            minimum: 0
        - name: amount_max
          in: query
          required: false
          schema:
            type: number
            minimum: 0
        - name: variance_threshold
          in: query
          required: false
          schema:
            type: number
        - name: variance_has_variance
          in: query
          required: false
          schema:
            type: boolean
        - name: duration_min_hours
          in: query
          required: false
          schema:
            type: number
            minimum: 0
        - name: duration_max_hours
          in: query
          required: false
          schema:
            type: number
            minimum: 0
        - name: payment_methods
          in: query
          required: false
          schema:
            type: array
            items:
              type: string
          style: form
          explode: true
        - name: has_donation
          in: query
          required: false
          schema:
            type: boolean
      responses:
        "200":
          description: Liste paginée
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CashSessionListResponseV1"
        "401":
          description: Non authentifié
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecycliqueApiError"
        "403":
          description: Accès refusé
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecycliqueApiError"
  /v1/cash-sessions/stats/summary:
    get:
      operationId: recyclique_cashSessions_getSessionStatsSummary
      tags:
        - cash-sessions
        - admin
      summary: Agrégats KPI sessions de caisse (plage + site)
      description: |
        **Backend** : `GET /v1/cash-sessions/stats/summary` — statistiques agrégées (ADMIN / SUPER_ADMIN).
        Le serveur peut émettre des en-têtes de dépréciation (`Deprecation`, `Sunset`, `Link`) vers `GET /v1/stats/live` ;
        l’endpoint reste opérationnel pour les écrans de supervision (session-manager).
      security:
        - bearerOrCookie: []
      parameters:
        - name: date_from
          in: query
          required: false
          schema:
            type: string
            format: date-time
        - name: date_to
          in: query
          required: false
          schema:
            type: string
            format: date-time
        - name: site_id
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Statistiques agrégées
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CashSessionStatsSummaryV1"
        "401":
          description: Non authentifié
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecycliqueApiError"
        "403":
          description: Rôle insuffisant (réservé ADMIN / SUPER_ADMIN côté backend)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecycliqueApiError"
  /v1/sites/:
    get:
      operationId: recyclique_sites_listSites
      tags:
        - sites
        - admin
      summary: Liste des sites
      description: |
        **Backend** : `GET /v1/sites/` — liste pour filtres admin (session-manager, postes, etc.).
        Rôles : USER, ADMIN, SUPER_ADMIN.
      security:
        - bearerOrCookie: []
      parameters:
        - name: skip
          in: query
          required: false
          schema:
            type: integer
            minimum: 0
            default: 0
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 100
        - name: only_active
          in: query
          required: false
          schema:
            type: boolean
            default: false
      responses:
        "200":
          description: Liste des sites
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SiteV1Response"
        "401":
          description: Non authentifié
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecycliqueApiError"
        "403":
          description: Accès refusé
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecycliqueApiError"
    post:
      operationId: recyclique_sites_createSite
      tags:
        - sites
        - admin
      summary: Créer un site
      description: |
        Réservé ADMIN / SUPER_ADMIN. Corps aligné sur `SiteCreate` backend.
      security:
        - bearerOrCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SiteV1Create"
      responses:
        "201":
          description: Site créé
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SiteV1Response"
        "401":
          description: Non authentifié
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecycliqueApiError"
        "403":
          description: Accès refusé
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecycliqueApiError"
        "422":
          description: Corps invalide
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecycliqueApiError"
  /v1/sites/{site_id}:
    get:
      operationId: recyclique_sites_getSiteById
      tags:
        - sites
        - admin
      summary: Détail d'un site
      description: Réservé ADMIN / SUPER_ADMIN.
      security:
        - bearerOrCookie: []
      parameters:
        - name: site_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Site
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SiteV1Response"
        "401":
          description: Non authentifié
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecycliqueApiError"
        "403":
          description: Accès refusé
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecycliqueApiError"
        "404":
          description: Site introuvable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecycliqueApiError"
    patch:
      operationId: recyclique_sites_updateSite
      tags:
        - sites
        - admin
      summary: Mettre à jour un site
      description: Mise à jour partielle (`SiteUpdate` backend).
      security:
        - bearerOrCookie: []
      parameters:
        - name: site_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SiteV1Update"
      responses:
        "200":
          description: Site mis à jour
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SiteV1Response"
        "401":
          description: Non authentifié
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecycliqueApiError"
        "403":
          description: Accès refusé
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecycliqueApiError"
        "404":
          description: Site introuvable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecycliqueApiError"
        "422":
          description: Corps invalide
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecycliqueApiError"
    delete:
      operationId: recyclique_sites_deleteSite
      tags:
        - sites
        - admin
      summary: Supprimer un site
      description: |
        Suppression définitive si aucune dépendance bloquante ; sinon **409** (utilisateurs liés, etc.).
      security:
        - bearerOrCookie: []
      parameters:
        - name: site_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: Supprimé
        "401":
          description: Non authentifié
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecycliqueApiError"
        "403":
          description: Accès refusé
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecycliqueApiError"
        "404":
          description: Site introuvable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecycliqueApiError"
        "409":
          description: Conflit (dépendances)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecycliqueApiError"
  /v1/cash-registers/:
    get:
      operationId: recyclique_cashRegisters_listCashRegisters
      tags:
        - cash-registers
        - admin
      summary: Lister les postes de caisse
      description: |
        Liste paginée ; filtre optionnel par `site_id`. Rôles lecture : USER, ADMIN, SUPER_ADMIN.
      security:
        - bearerOrCookie: []
      parameters:
        - name: skip
          in: query
          required: false
          schema:
            type: integer
            minimum: 0
            default: 0
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 100
        - name: site_id
          in: query
          required: false
          schema:
            type: string
            format: uuid
        - name: only_active
          in: query
          required: false
          schema:
            type: boolean
            default: false
      responses:
        "200":
          description: Liste des postes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CashRegisterV1Response"
        "401":
          description: Non authentifié
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecycliqueApiError"
        "403":
          description: Accès refusé
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecycliqueApiError"
    post:
