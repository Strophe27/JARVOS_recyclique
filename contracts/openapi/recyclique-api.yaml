components:
  securitySchemes:
    bearerOrCookie:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        JWT d'accès. Alternative same-origin : cookie httpOnly `recyclique_access` (nom par défaut serveur), sans duplication de la logique d'autorisation côté client.
    adminSessionStrict:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        Même transport JWT que `bearerOrCookie` (header **Authorization: Bearer** ou cookie httpOnly d'accès).
        Story 16.2 : routes observabilité utilisent `require_admin_role_strict()` → `get_current_user_strict` :
        **403** « Not authenticated » si ni Bearer ni cookie (au lieu du **401** typique de `require_admin_role` sans jeton).
        Toujours exiger ensuite rôle ADMIN ou SUPER_ADMIN (403 « Accès refusé - rôle administrateur requis » si USER).
  schemas:
    AdminBulkExportFormat:
      type: string
      enum:
        - csv
        - excel
    AdminBulkCashSessionsExportRequest:
      type: object
      additionalProperties: false
      required:
        - filters
        - format
      properties:
        filters:
          type: object
          description: Filtres sessions (dates ISO, statut, site_id, etc.)
          additionalProperties: true
        format:
          $ref: "#/components/schemas/AdminBulkExportFormat"
    AdminBulkReceptionTicketsExportRequest:
      type: object
      additionalProperties: false
      required:
        - filters
        - format
      properties:
        filters:
          type: object
          description: Filtres tickets réception
          additionalProperties: true
        format:
          $ref: "#/components/schemas/AdminBulkExportFormat"
    UserV1Response:
      type: object
      description: |
        Corps JSON `UserResponse` (routes `GET /v1/users/` et `GET /v1/users/{user_id}`). Story 16.1 / G-OA-03.
      required:
        - id
        - username
        - role
        - status
        - is_active
        - created_at
        - updated_at
      properties:
        id:
          type: string
          format: uuid
        username:
          type: string
        first_name:
          type: string
          nullable: true
        last_name:
          type: string
          nullable: true
        email:
          type: string
          format: email
          nullable: true
        phone_number:
          type: string
          nullable: true
        address:
          type: string
          nullable: true
        notes:
          type: string
          nullable: true
        skills:
          type: string
          nullable: true
        availability:
          type: string
          nullable: true
        role:
          type: string
          enum:
            - super-admin
            - admin
            - user
        status:
          type: string
          enum:
            - pending
            - approved
            - rejected
            - active
        is_active:
          type: boolean
        site_id:
          type: string
          format: uuid
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
      additionalProperties: false
    UserCreateV1Request:
      type: object
      additionalProperties: false
      required:
        - username
        - password
      properties:
        username:
          type: string
          minLength: 3
        password:
          type: string
          minLength: 8
          description: Règles de robustesse alignées sur le validateur backend (majuscule, minuscule, chiffre, caractère spécial).
        first_name:
          type: string
          nullable: true
        last_name:
          type: string
          nullable: true
        email:
          type: string
          format: email
          nullable: true
        phone_number:
          type: string
          nullable: true
        address:
          type: string
          nullable: true
        notes:
          type: string
          nullable: true
        skills:
          type: string
          nullable: true
        availability:
          type: string
          nullable: true
        role:
          $ref: "#/components/schemas/UserRole"
        status:
          $ref: "#/components/schemas/UserStatus"
        is_active:
          type: boolean
          default: true
        site_id:
          type: string
          format: uuid
          nullable: true
    UserUpdateV1Request:
      type: object
      additionalProperties: false
      properties:
        username:
          type: string
          nullable: true
        first_name:
          type: string
          nullable: true
        last_name:
          type: string
          nullable: true
        email:
          type: string
          format: email
          nullable: true
        phone_number:
          type: string
          nullable: true
        address:
          type: string
          nullable: true
        notes:
          type: string
          nullable: true
        skills:
          type: string
          nullable: true
        availability:
          type: string
          nullable: true
        role:
          $ref: "#/components/schemas/UserRole"
        status:
          $ref: "#/components/schemas/UserStatus"
        is_active:
          type: boolean
          nullable: true
        site_id:
