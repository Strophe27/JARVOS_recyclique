  /v1/cash-sessions/{session_id}/close:
    post:
      operationId: recyclique_cashSessions_closeSession
      tags:
        - cash-sessions
      summary: Fermer une session de caisse (step-up PIN + idempotence)
      description: |
        Story 2.4 : mutation sensible — **preuve serveur** obligatoire via en-tête `X-Step-Up-Pin`
        (jamais journalisée en clair). Idempotence optionnelle : `Idempotency-Key` + même corps →
        réponse rejouée ; corps différent avec la même clé → **409** (`IDEMPOTENCY_KEY_CONFLICT`).
        Corrélation : `X-Request-Id` (réponse reprend l’identifiant client ou un UUID serveur).

        Story 6.7 : si au moins une vente `lifecycle_status` **held** existe pour la session,
        réponse **400** avec enveloppe AR21, `code` **`CASH_SESSION_CLOSE_HELD_PENDING`** (pas de clôture
        tant que des tickets sont en attente — aligné Story 6.3).

        **Story 8.1** : en cas de clôture **persistée** (session non vide), une ligne **outbox Paheko**
        (`paheko_outbox_items`) est écrite **dans la même transaction** SQL que la mise à jour locale
        de la session. Cela **ne** constitue **pas** une « sync OK » Paheko : l'état distant est porté
        par l'outbox et les endpoints `recyclique_pahekoOutbox_*` / `sync_operational_summary` (bandeau).

        **Story 8.5** : réponse 200 enrichie avec `paheko_sync_correlation_id` et `paheko_outbox_item_id`
        (lien support vers `GET .../admin/paheko-outbox/items/{id}` et `recyclique_pahekoOutbox_getCorrelationTimeline`).

        **Story 8.6** : refus **politique sync** (action finale A1) — **409** avec enveloppe AR21,
        `code` **`PAHEKO_SYNC_FINAL_ACTION_REFUSED`**, champs optionnels `policy_reason_code`
        (`PAHEKO_SYNC_A1_BLOCKED_SESSION_OUTBOX_QUARANTINE` ou `PAHEKO_SYNC_A1_BLOCKED_CLOSE_MAPPING`),
        `mapping_resolution_code`, `blocking_outbox_item_id`, etc. **Distinct** d'une clôture **200**
        avec outbox en file (`paheko_outbox_item_id` présent) — le client ne doit pas les confondre.
      security:
        - bearerOrCookie: []
      parameters:
        - name: session_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: X-Step-Up-Pin
          in: header
          required: true
          schema:
            type: string
          description: PIN opérateur (4 chiffres) — preuve step-up ; ne pas logger.
        - name: Idempotency-Key
          in: header
          required: false
          schema:
            type: string
          description: Clé client pour éviter doubles effets (Redis, TTL 24h).
        - name: X-Request-Id
          in: header
          required: false
          schema:
            type: string
          description: Identifiant de corrélation ; renvoyé tel quel ou complété par le serveur.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CashSessionCloseBody"
      responses:
        "200":
          description: Session fermée (ou session vide supprimée — corps `deleted`)
        "400":
          description: |
            Erreur métier / validation fermeture. Codes métier possibles : `CASH_SESSION_CLOSE_HELD_PENDING`
            (tickets en attente), écart sans commentaire, session déjà fermée, etc.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecycliqueApiError"
        "401":
          description: Non authentifié
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecycliqueApiError"
        "403":
          description: Step-up PIN manquant, invalide, ou PIN non configuré — codes `STEP_UP_PIN_*`
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecycliqueApiError"
        "404":
          description: Session introuvable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecycliqueApiError"
        "409":
          description: |
            Conflit idempotence (`IDEMPOTENCY_KEY_CONFLICT`) **ou** refus politique sync Story **8.6**
            (`PAHEKO_SYNC_FINAL_ACTION_REFUSED` + `policy_reason_code` — quarantaine outbox session ou mapping clôture).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecycliqueApiError"
        "422":
          description: Corps JSON invalide
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecycliqueApiError"
        "429":
          description: Verrouillage temporaire après échecs PIN répétés — `STEP_UP_LOCKED`
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecycliqueApiError"
  /v1/admin/paheko-outbox/items:
    get:
      operationId: recyclique_pahekoOutbox_listItems
      tags:
        - admin
        - paheko-outbox
      summary: Lister les éléments d'outbox Paheko (observabilité Epic 8)
      description: |
        **Stories 8.1–8.2** : lecture versionnée des lignes outbox — états **distincts** de la seule persistance locale.
        Filtres optionnels : type d'opération, session caisse, statut technique outbox (`pending`, `processing`, `delivered`, `failed`).
        Permissions : **ADMIN** ou **SUPER_ADMIN** (support).

        **Story 8.2** : échec **retryable** (5xx, 408, 429, erreur réseau) → `outbox_status=pending` + `sync_state_core=a_reessayer`
        + `next_retry_at` (backoff exponentiel plafonné) tant que `attempt_count < PAHEKO_OUTBOX_MAX_ATTEMPTS` ; au-delà →
        `failed` + `en_quarantaine`. **409** distants comptent comme **preuve idempotente** (`resolu` / `delivered`).
        **`rejete`** : décision explicite via `POST .../reject` (pas de retry automatique identique).

        **Story 8.5** : filtre optionnel `correlation_id` (égalité exacte) ; vue agrégée `GET .../by-correlation/{correlation_id}`.
      security:
        - bearerOrCookie: []
      parameters:
        - name: skip
          in: query
          schema:
            type: integer
            minimum: 0
            default: 0
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 50
        - name: operation_type
          in: query
          required: false
          schema:
            type: string
        - name: cash_session_id
          in: query
          required: false
          schema:
            type: string
            format: uuid
        - name: outbox_status
          in: query
          required: false
          schema:
            type: string
            description: pending, processing, delivered, failed
        - name: correlation_id
          in: query
          required: false
          schema:
            type: string
          description: Story 8.5 — filtre exact sur correlation_id (support / supervision).
      responses:
        "200":
          description: Liste paginée
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PahekoOutboxListResponse"
        "401":
          description: Non authentifié
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecycliqueApiError"
        "403":
          description: Accès refusé
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecycliqueApiError"
