    RecycliqueApiError:
      type: object
      description: |
        Enveloppe d'erreur JSON stable (AR21). Propriétés en snake_case ; dates ailleurs en ISO 8601.
        Le champ `correlation_id` reprend la valeur de corrélation (alignée sur `X-Request-Id`, Story 2.5).
      required:
        - code
        - detail
        - retryable
        - correlation_id
      properties:
        code:
          type: string
          description: |
            Code machine stable : soit dérivé du statut HTTP (UNAUTHORIZED, NOT_FOUND, …),
            soit code métier explicite pour certaines 403/409/429 (ex. STEP_UP_PIN_REQUIRED,
            IDEMPOTENCY_KEY_CONFLICT, STEP_UP_LOCKED).
        detail:
          description: |
            Message texte (4xx/5xx hors validation) ou liste d'erreurs de validation (422 — équivalent
            ancien corps FastAPI `detail` tableau).
          oneOf:
            - type: string
            - type: array
              items:
                type: object
                additionalProperties: true
        retryable:
          type: boolean
          description: Vrai si un nouvel essai peut réussir (ex. 429, 503).
        state:
          type: string
          nullable: true
          description: État opérationnel optionnel côté domaine ; `null` si non applicable.
        correlation_id:
          type: string
          description: Identifiant pour corrélation support et logs (sans données sensibles).
        policy_reason_code:
          type: string
          nullable: true
          description: |
            Story 8.6 — présent si `code` = `PAHEKO_SYNC_FINAL_ACTION_REFUSED` : sous-code stable
