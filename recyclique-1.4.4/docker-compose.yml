services:
  postgres:
    image: postgres:15
    environment:
      # Même valeur par défaut que DATABASE_URL / POSTGRES_* des services api et api-migrations
      POSTGRES_DB: ${POSTGRES_DB:-recyclic}
      POSTGRES_USER: recyclic
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backups:/backups
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - recyclic-network

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - recyclic-network

  api:
    build:
      context: ../recyclique/api
      args:
        # Aligné sur le Dockerfile (défaut 1.4.4) ; surcharge via .env ou export APP_VERSION=…
        APP_VERSION: ${APP_VERSION:-1.4.4}
        COMMIT_SHA: ${COMMIT_SHA:-unknown}
        BRANCH: ${BRANCH:-unknown}
        COMMIT_DATE: ${COMMIT_DATE:-unknown}
        BUILD_DATE: ${BUILD_DATE:-unknown}
    image: recyclic-api:${API_IMAGE_TAG:-latest}
    # Dev local : --reload explicite ici ; le CMD du Dockerfile est sans reload (image utilisable hors compose).
    command: uvicorn recyclic_api.main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      DATABASE_URL: postgresql://recyclic:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-recyclic}
      REDIS_URL: redis://redis:6379
      SECRET_KEY: ${SECRET_KEY}
      ENVIRONMENT: ${ENVIRONMENT:-development}
      HOST: 0.0.0.0
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1}
      CORS_ALLOW_ORIGINS: ${CORS_ALLOW_ORIGINS:-http://localhost:4444}
      BACKEND_CORS_ORIGINS: ${BACKEND_CORS_ORIGINS:-http://localhost:4444}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:4444}
      API_V1_STR: ${API_V1_STR:-/v1}
      ROOT_PATH: ${ROOT_PATH:-}
      # Semver affichée par l'API (/health, etc.) : cohérente avec le build ARG APP_VERSION
      APP_VERSION: ${APP_VERSION:-1.4.4}
      # Email Service (Brevo)
      BREVO_API_KEY: ${BREVO_API_KEY}
      BREVO_WEBHOOK_SECRET: ${BREVO_WEBHOOK_SECRET}
      EMAIL_FROM_NAME: ${EMAIL_FROM_NAME}
      EMAIL_FROM_ADDRESS: ${EMAIL_FROM_ADDRESS}
      # Variables pour Alembic migrations
      POSTGRES_HOST: postgres
      POSTGRES_USER: recyclic
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-recyclic}
      # Bootstrap premier super-admin (lu depuis .env au démarrage ; sans ça le login admin échoue en Docker)
      FIRST_SUPER_ADMIN_USERNAME: ${FIRST_SUPER_ADMIN_USERNAME:-}
      FIRST_SUPER_ADMIN_PASSWORD: ${FIRST_SUPER_ADMIN_PASSWORD:-}
      # Configuration pour les tests
      TEST_DATABASE_URL: postgresql://recyclic:${POSTGRES_PASSWORD}@postgres:5432/recyclic_test
      # TESTING: "true"  # Désactivé - ne doit être activé que lors des tests
      # Legacy Import - LLM Fallback (B47-P5)
      LEGACY_IMPORT_LLM_PROVIDER: ${LEGACY_IMPORT_LLM_PROVIDER:-}
      LEGACY_IMPORT_LLM_MODEL: ${LEGACY_IMPORT_LLM_MODEL:-}
      LEGACY_IMPORT_LLM_BATCH_SIZE: ${LEGACY_IMPORT_LLM_BATCH_SIZE:-20}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_API_BASE_URL: ${OPENROUTER_API_BASE_URL:-https://openrouter.ai/api/v1}
    ports:
      - "${API_PORT:-8000}:8000"
    volumes:
      - ../recyclique/api/src:/app/src
      - ../recyclique/api/tests:/app/tests
      - ./backups:/backups
      - ./logs:/app/logs  # B48-P2: Volume pour les logs transactionnels
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - recyclic-network

  # Emplacement laissé vide : ancien bot de notification tiers retiré (assainissement 1.4.5, 2026-03-26). Voir journal references/consolidation-1.4.5/.

  # Service dédié pour les migrations Alembic avec configuration Docker optimisée
  api-migrations:
    build:
      context: ../recyclique/api
      dockerfile: Dockerfile.migrations
    image: recyclic-api-migrations:${API_MIGRATIONS_IMAGE_TAG:-latest}
    command: alembic upgrade head
    environment:
      DATABASE_URL: postgresql://recyclic:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-recyclic}
      REDIS_URL: redis://redis:6379
      SECRET_KEY: ${SECRET_KEY}
      ENVIRONMENT: ${ENVIRONMENT:-development}
      API_V1_STR: ${API_V1_STR:-/v1}
      ROOT_PATH: ${ROOT_PATH:-}
      # Variables pour Alembic migrations
      POSTGRES_HOST: postgres
      POSTGRES_USER: recyclic
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-recyclic}
      # Legacy Import - LLM Fallback (B47-P5) - pas utilisé directement par Alembic,
      # mais gardé pour cohérence en cas d'accès à Settings dans les migrations.
      LEGACY_IMPORT_LLM_PROVIDER: ${LEGACY_IMPORT_LLM_PROVIDER:-}
      LEGACY_IMPORT_LLM_MODEL: ${LEGACY_IMPORT_LLM_MODEL:-}
      LEGACY_IMPORT_LLM_BATCH_SIZE: ${LEGACY_IMPORT_LLM_BATCH_SIZE:-20}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_API_BASE_URL: ${OPENROUTER_API_BASE_URL:-https://openrouter.ai/api/v1}
    depends_on:
      postgres:
        condition: service_healthy
      # Pas de dépendance Redis : Alembic n'utilise que PostgreSQL ; REDIS_URL reste
      # fourni pour satisfaire Settings importé par migrations/env.py (aucune connexion Redis).
    networks:
      - recyclic-network
    restart: "no"

  # # Service dédié pour les tests (désactivé). Exécution : recyclique/api/run_tests.sh ou
  # #   docker compose run --rm -e TESTING=true api bash -lc "cd /app && python -m pytest …"
  # api-tests:
  #   build:
  #     context: ../recyclique/api
  #     dockerfile: Dockerfile.tests
  #   image: recyclic-api-tests:${API_TESTS_IMAGE_TAG:-latest}
  #   environment:
  #     TESTING: "true"
  #     ENVIRONMENT: "test"
  #     DATABASE_URL: postgresql://recyclic:${POSTGRES_PASSWORD}@postgres:5432/recyclic_test
  #     TEST_DATABASE_URL: postgresql://recyclic:${POSTGRES_PASSWORD}@postgres:5432/recyclic_test
  #     REDIS_URL: redis://redis:6379
  #     SECRET_KEY: ${SECRET_KEY}
  #   volumes:
  #     # Volumes pour éviter les rebuilds lors du développement
  #     - ../recyclique/api/src:/app/src:ro
  #     - ../recyclique/api/tests:/app/tests:ro
  #     - ../recyclique/api/migrations:/app/migrations
  #     - ../recyclique/api/alembic.ini:/app/alembic.ini:ro
  #     - ../recyclique/api/pytest.ini:/app/pytest.ini:ro
  #   depends_on:
  #     postgres:
  #       condition: service_healthy
  #     redis:
  #       condition: service_healthy
  #   command: bash -lc "python generate_openapi.py && alembic upgrade head && python -m pytest -v --tb=short"
  #   networks:
  #     - recyclic-network

  # ============================================================
  # FRONTEND SERVICES - DEV ONLY
  # ============================================================

  # DEV: Frontend with hot-reload for local development
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
      args:
        COMMIT_SHA: ${COMMIT_SHA:-unknown}
        BRANCH: ${BRANCH:-unknown}
        COMMIT_DATE: ${COMMIT_DATE:-unknown}
    image: recyclic-frontend-dev:${FRONTEND_IMAGE_TAG:-latest}
    environment:
      DANGEROUSLY_DISABLE_HOST_CHECK: "true"
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
    ports:
      - "4444:5173"
    volumes:
      # Mount source code for hot-reloading
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
      - ./frontend/tests:/app/tests
      - ./frontend/package.json:/app/package.json
      - ./frontend/vite.config.js:/app/vite.config.js
      - ./frontend/tsconfig.json:/app/tsconfig.json
      - ./frontend/tsconfig.node.json:/app/tsconfig.node.json
    depends_on:
      api:
        condition: service_healthy
    networks:
      - recyclic-network

volumes:
  postgres_data:
  # backups volume is mounted from ./backups directory on host

networks:
  recyclic-network:
    driver: bridge
