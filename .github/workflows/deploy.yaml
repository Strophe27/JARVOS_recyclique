# CI/CD — mono-repo JARVOS_recyclique
# CI rapide frontend : peintre-nano
# Déploiement production : frontend legacy brownfield tant qu'un chantier dédié ne l'a pas migré
name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test-fast:
    name: "Tests rapides (excluant performance)"
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: peintre-nano/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version-file: 'recyclique/api/.python-version'

      - name: Install dependencies
        run: |
          cd peintre-nano && npm ci
          cd ../recyclique/api && pip install -r requirements.txt

      - name: Lint code
        run: cd peintre-nano && npm run lint

      - name: Run fast tests (excluding performance)
        run: |
          cd peintre-nano && npm run test
          cd ../recyclique/api && python -m pytest tests/ -v -m "not performance"
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test
          REDIS_URL: redis://localhost:6379

  test-complete:
    name: "Tests complets (incluant performance)"
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version-file: 'recyclique/api/.python-version'

      - name: Install dependencies
        run: cd recyclique/api && pip install -r requirements.txt

      - name: Run all tests (including performance)
        run: cd recyclique/api && python -m pytest tests/ -v
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test
          REDIS_URL: redis://localhost:6379

  build-and-deploy:
    needs: [test-fast, test-complete]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v3

      - name: Set version tag
        id: vars
        run: echo "tag=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Build Docker images
        run: |
          docker build -t recyclic-api:${{ steps.vars.outputs.tag }} -f recyclique/api/Dockerfile recyclique/api
          # Legacy kept temporarily for production deployment until a dedicated migration story realigns prod.
          docker build -t recyclic-frontend:${{ steps.vars.outputs.tag }} -f recyclique-1.4.4/frontend/Dockerfile recyclique-1.4.4/frontend

      - name: Deploy to production
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          script: |
            set -e
            echo "Starting atomic deployment with version ${{ steps.vars.outputs.tag }}..."
            cd /opt/recyclic
            git pull origin main

            echo "API_IMAGE_TAG=${{ steps.vars.outputs.tag }}" > .env.production
            echo "FRONTEND_IMAGE_TAG=${{ steps.vars.outputs.tag }}" >> .env.production

            chmod +x scripts/atomic-deploy.sh
            ./scripts/atomic-deploy.sh ${{ steps.vars.outputs.tag }}

            echo "Atomic deployment completed successfully with version ${{ steps.vars.outputs.tag }}"
